name: CI

run-name: ${{ startsWith(github.ref, 'refs/tags/v') && format('Publishing version {0}', github.ref_name) || github.event.pull_request.title || github.event.head_commit.message || github.ref_name }}

on:
  push:
  pull_request:

permissions: read-all  # zizmor: ignore[excessive-permissions] intentional: workflow default is read-only, every job opts into exactly the write scopes it needs

# Keyed on event+ref: a newer push/PR-update cancels the previous
# still-running check for the same branch/PR, while keying on event name
# too keeps a `push` and `pull_request` run for the same branch from
# cancelling each other. Nothing needs main-push special-casing any more —
# main only ever receives already-tested, already-published content (see
# the version job below), so its own push run does no real work regardless
# of how many land close together.
concurrency:
  group: ${{ format('{0}-{1}', github.event_name, github.ref) }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, type-check, and test
    # Skipped only for a push to ship/a bot branch or to main — those pushes
    # do no CI work at all under the current design: a push to ship/a bot
    # branch just gets a PR opened (auto-pr-merge.yml / the platform's own
    # automerge workflow), and the pull_request event that follows is where
    # this actually runs; a push to main lands content that a PR already
    # fully tested and published, so it's a pure no-op. Every other trigger
    # (any pull_request, a tag push, a push to some other branch) runs this
    # for real — there's no more "redundant second run of the same commit"
    # case to skip, since real work now happens on exactly one event per
    # commit, not two.
    # Checked directly against github.* here (mirroring the version job's
    # own if: below) rather than needs.version.outputs.* so this doesn't
    # gain a needs: [version] dependency that would delay its otherwise-
    # immediate start just to read a value it could evaluate itself.
    if: |
      !(github.event_name == 'push' && (github.ref == 'refs/heads/ship' || startsWith(github.ref, 'refs/heads/dependabot/') || startsWith(github.ref, 'refs/heads/renovate/') || github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write  # pip-audit SARIF upload
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: requirements/ci.txt

      - name: Set up venv
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet --require-hashes -r requirements/ci.txt

      - name: Check migration chain integrity
        run: .venv/bin/python scripts/check_migrations.py

      - name: Lint with Ruff
        run: .venv/bin/ruff check .

      - name: Check formatting with Ruff
        run: .venv/bin/ruff format --check .

      - name: Type-check with mypy
        run: .venv/bin/mypy app/

      - name: Security scan with bandit
        run: .venv/bin/bandit -c pyproject.toml -r app/ -ll -i

      - name: Lint workflows with zizmor
        run: .venv/bin/zizmor -q --persona=pedantic --offline .github/

      - name: Install actionlint
        run: |
          curl -sfL -o actionlint.tar.gz https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  actionlint.tar.gz" | sha256sum -c -
          tar xzf actionlint.tar.gz actionlint

      - name: Lint workflows with actionlint
        run: ./actionlint -color

      - name: Audit all dependencies (runtime + transitive)
        id: pip-audit
        continue-on-error: true
        run: .venv/bin/pip-audit --local --format json -o pip-audit.json

      - name: Convert pip-audit JSON to SARIF
        if: always() && hashFiles('pip-audit.json') != ''
        run: python3 .github/scripts/pip_audit_to_sarif.py pip-audit.json pip-audit.sarif

      - name: Upload pip-audit results to GitHub Security tab
        if: always() && hashFiles('pip-audit.sarif') != ''
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          sarif_file: pip-audit.sarif
          category: pip-audit

      - name: Fail if pip-audit found vulnerabilities
        if: steps.pip-audit.outcome == 'failure'
        run: exit 1

      - name: Check translations are up to date
        run: |
          .venv/bin/python scripts/check_translations.py
          .venv/bin/pybabel compile -d app/translations

      - name: Run tests
        run: bash scripts/run-tests-with-coverage.sh

      - name: Generate coverage badge
        # Custom script rather than genbadge: the badge also shows the
        # passing test count after the percentage (e.g. "100.00% (3309
        # tests)"), which genbadge has no option to append. Replicates
        # genbadge's own color thresholds/formula — see
        # scripts/generate_coverage_badge.py.
        run: .venv/bin/python scripts/generate_coverage_badge.py

      - name: Install fuzzing dependencies (for fuzz-coverage report)
        run: .venv/bin/pip install --quiet --require-hashes -r requirements/fuzz.txt

      # One restore step per harness — actions/cache/restore doesn't support
      # restoring several independently-keyed caches in one step. The `key:`
      # below is deliberately never going to hit (it's unique per run); this
      # job only ever reads the corpus fuzzing.yml has been growing on push-
      # to-main and weekly runs, never writes one back, so only the
      # restore-keys prefix match (falling back to main's most recent cache,
      # per GitHub's default-branch cache scoping) matters here.
      - name: Restore fuzz corpus (fuzz_safe_next)
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: fuzz/corpus/fuzz_safe_next
          key: fuzz-corpus-fuzz_safe_next-release-only-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-fuzz_safe_next-

      - name: Restore fuzz corpus (fuzz_safe_join)
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: fuzz/corpus/fuzz_safe_join
          key: fuzz-corpus-fuzz_safe_join-release-only-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-fuzz_safe_join-

      - name: Restore fuzz corpus (fuzz_safe_path_component)
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: fuzz/corpus/fuzz_safe_path_component
          key: fuzz-corpus-fuzz_safe_path_component-release-only-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-fuzz_safe_path_component-

      - name: Restore fuzz corpus (fuzz_logbook_parse_file)
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: fuzz/corpus/fuzz_logbook_parse_file
          key: fuzz-corpus-fuzz_logbook_parse_file-release-only-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-fuzz_logbook_parse_file-

      - name: Restore fuzz corpus (fuzz_logbook_value_parsers)
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: fuzz/corpus/fuzz_logbook_value_parsers
          key: fuzz-corpus-fuzz_logbook_value_parsers-release-only-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-fuzz_logbook_value_parsers-

      - name: Restore fuzz corpus (fuzz_gps_import)
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: fuzz/corpus/fuzz_gps_import
          key: fuzz-corpus-fuzz_gps_import-release-only-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-fuzz_gps_import-

      - name: Generate fuzz coverage report
        # Replays whatever corpus was restored above (may be empty if
        # fuzzing.yml hasn't run yet, e.g. right after Phase 2 lands) through
        # each harness's real TestOneInput under coverage.py — see
        # scripts/fuzz_coverage_report.py. Produces htmlcov-fuzz/ and
        # coverage-fuzz.xml, mirroring the pytest htmlcov/ and coverage.xml
        # above so both reports sit side by side on the Pages site.
        run: .venv/bin/python scripts/fuzz_coverage_report.py

      - name: Generate fuzz harness-count badge
        # A percentage badge here reads as a failing metric next to the 100%
        # pytest Coverage badge, when it's actually a different-in-kind
        # number (see the "Fuzzing" section of docs/development.md) that's
        # only ever going to be a small fraction of the target files' lines.
        # A harness count doesn't have that problem and is the more honest
        # "how much fuzzing is set up" signal for a badge. mkdir needed since
        # this step can run even when the "Generate fuzz coverage report"
        # step above found no corpus at all yet (brand-new harness, no
        # fuzzing.yml run since) and so never created htmlcov-fuzz/.
        run: |
          mkdir -p htmlcov-fuzz
          harness_files=(fuzz/fuzz_*.py)
          harness_count=${#harness_files[@]}
          curl -sf "https://img.shields.io/badge/fuzz%20harnesses-${harness_count}-blue" \
            -o htmlcov-fuzz/badge.svg

      - name: Set up Node.js (for vendor assets)
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: requirements/package-lock.json

      - name: Install vendor assets for Pages
        run: python3 scripts/install_vendor_assets.py

      - name: Assemble Pages site
        run: |
          mkdir -p _site/coverage
          cp -r htmlcov/. _site/coverage/
          # Only present when fuzzing.yml has already grown a corpus to
          # replay (see the "Generate fuzz coverage report" step above) —
          # absent on e.g. the very first release after Phase 2 fuzzing
          # lands, before that workflow has run even once.
          if [ -d htmlcov-fuzz ]; then
            mkdir -p _site/fuzz-coverage
            cp -r htmlcov-fuzz/. _site/fuzz-coverage/
          fi
          cp -r app/static _site/static
          # Extract repo URL (first GitHub URL in README) and demo site URL
          OPENHANGAR_REPO_URL=$(grep -oP 'https://github\.com/[^/]+/[^/)]+' README.md | head -1)
          OPENHANGAR_DEMO_SITE_URL=$(grep 'Try the demo' README.md | grep -oP 'https://[^)]+' | tail -1)
          if [ -z "$OPENHANGAR_DEMO_SITE_URL" ]; then
            echo "WARNING: No demo site URL found in README.md — demo button will not appear on GitHub Pages."
          fi
          OPENHANGAR_DATABASE_URL=sqlite:///:memory: OPENHANGAR_SECRET_KEY=ci-pages-not-for-production-use-only OPENHANGAR_REPO_URL="$OPENHANGAR_REPO_URL" OPENHANGAR_DEMO_SITE_URL="$OPENHANGAR_DEMO_SITE_URL" \
            .venv/bin/python - <<'PYEOF'
          import sys
          sys.path.insert(0, 'app')
          from init import create_app
          app = create_app()
          app.config['TESTING'] = True
          with app.app_context():
              from models import db
              db.create_all()
          import re
          with app.test_client() as c:
              html = c.get('/').data.decode('utf-8')
          # Rewrite Flask absolute static paths to relative for GitHub Pages
          html = html.replace('href="/static/', 'href="static/')
          html = html.replace('src="/static/', 'src="static/')
          # The static page is not a PWA — SW registration would fail on GitHub Pages
          # (served from a subdirectory, so /sw.js resolves to the wrong origin).
          # Strip pwa.js so the browser never attempts SW registration.
          html = re.sub(r'<script[^>]+/pwa\.js"[^>]*></script>', '', html)
          # Remove hx-boost from <body> so demo form POSTs go directly to the demo
          # site as a normal cross-origin form submission instead of being
          # intercepted by HTMX (which rejects cross-origin targets with invalidPath).
          html = html.replace(' hx-boost="true"', '')
          # manifest.json is served dynamically by Flask; there is no manifest at
          # the GitHub Pages static path, so strip that <link> to avoid 404s.
          html = re.sub(r'<link rel="manifest"[^>]+>', '', html)
          with open('_site/index.html', 'w') as f:
              f.write(html)
          PYEOF

      - name: Upload site content artifact
        # Mirrors publish_now's own condition in the version job below
        # (duplicated here rather than depended-on, for the same
        # no-needs-dependency reason as this job's own if: above).
        if: |
          startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'pull_request' && (github.head_ref == 'ship' || startsWith(github.head_ref, 'dependabot/') || startsWith(github.head_ref, 'renovate/')))
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pages-content
          path: _site
          retention-days: 1

  dependency-review:
    name: Dependency review (new/changed dependencies)
    # Complements pip-audit/OSV, which audit the resulting dependency set —
    # this instead fails a PR that *introduces* a vulnerable, malicious, or
    # disallowed-license dependency, before merge. Only runs on pull_request
    # (the action doesn't support plain push events); the dependency graph it
    # reads is already populated by publish's dependency-snapshot submission.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: low
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, PSF-2.0, LGPL-3.0-or-later, MPL-2.0, MIT-CMU, 0BSD

  version:
    name: Compute build version
    # Computes the next semver from git tags and GHCR, outputs it for
    # downstream jobs so the version logic lives in exactly one place. Also
    # decides whether this run should assign a *real* version and publish on
    # success (publish_now) rather than a "development" placeholder:
    #   publish_now = true  — a pull_request for ship/a bot branch (the one
    #                         and only place that content gets tested — see
    #                         this job's own if: below), or a push to a
    #                         version tag. The exact image this run builds
    #                         and tests is the one that gets tagged :latest
    #                         and released — there's no separate rebuild.
    #   publish_now = false — any other pull_request (external contribution,
    #                         validated but never published) or a push to
    #                         some other branch (e.g. a WIP branch pushed
    #                         directly for its own CI feedback).
    # Skipped outright for a push to ship/a bot branch or to main — see
    # lint-and-test's if: above for the full rationale (same condition,
    # checked the same direct way). With this job skipped, every downstream
    # needs.version.outputs.* read resolves to an empty string, which fails
    # every comparison those jobs' own if: conditions make — so they all
    # correctly skip too, without needing version to have actually run. A
    # job's own if: is evaluated regardless of whether its needs completed,
    # skipped, or failed, as long as that job declares its own if: (only a
    # job with *no* if: falls back to requiring needs to have succeeded).
    if: |
      !(github.event_name == 'push' && (github.ref == 'refs/heads/ship' || startsWith(github.ref, 'refs/heads/dependabot/') || startsWith(github.ref, 'refs/heads/renovate/') || github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only the ship/bot-branch pull_request path actually queries GHCR for
    # "the next version" — serialising just those instances avoids two
    # simultaneous API reads racing each other. It does NOT fully close the
    # version-collision window: neither PR has actually published anything
    # yet when its version job runs (publishing happens much later, after
    # build+test), so two ship/bot PRs in flight at once can still compute
    # the same "next" number — closing that would mean serialising the
    # entire pipeline end-to-end, not just this lookup, which defeats the
    # purpose of testing-before-merge running in parallel. Accepted as a
    # rare, recoverable edge case (worst case: one publish's version tag
    # gets overwritten by the other's) given solo-maintainer usage plus
    # Dependabot's cooldown and Renovate's own throttling keep simultaneous
    # publish_now runs uncommon. Scoped to just this narrow case (a tag
    # push derives its version directly from the tag name, no query, no
    # race) so unrelated runs are never held up waiting for this lock;
    # everything else gets a unique group of its own (github.run_id), which
    # is really "no serialisation" in disguise.
    concurrency:
      group: ${{ (github.event_name == 'pull_request' && (github.head_ref == 'ship' || startsWith(github.head_ref, 'dependabot/') || startsWith(github.head_ref, 'renovate/'))) && 'version-lock' || github.run_id }}
      cancel-in-progress: false
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      version: ${{ steps.compute.outputs.version }}
      publish_now: ${{ steps.compute.outputs.publish_now }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0  # needed to inspect git tags for app-vs-other bump logic

      - name: Compute build version and publish role
        id: compute
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          PUBLISH_NOW=false
          case "${GITHUB_EVENT_NAME}" in
            push)
              case "${GITHUB_REF}" in
                refs/tags/v*) PUBLISH_NOW=true ;;
              esac
              ;;
            pull_request)
              case "${HEAD_REF}" in
                ship|dependabot/*|renovate/*) PUBLISH_NOW=true ;;
              esac
              ;;
          esac
          echo "publish_now=${PUBLISH_NOW}" >> "$GITHUB_OUTPUT"

          if [ "${PUBLISH_NOW}" != "true" ]; then
            VERSION="development"
            echo "Not a publish_now run — using placeholder version."
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "Using tagged version: ${VERSION}"
          else
            curl -sf --retry 3 --retry-delay 10 --retry-all-errors \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/users/e2jk/packages/container/openhangar/versions?per_page=100" \
              -o /tmp/ghcr-versions.json

            LAST_TAG=$(git tag --list 'v[0-9]*' --sort=-version:refname | head -1)
            if [ -n "$LAST_TAG" ] && [ -z "$(git log "${LAST_TAG}..HEAD" --oneline -- app/)" ]; then
              BUMP="patch"
            else
              BUMP="minor"
            fi
            echo "Last release tag: ${LAST_TAG:-<none>}, bump type: ${BUMP}"

            VERSION=$(python3 .github/scripts/next_semver.py --bump "${BUMP}" < /tmp/ghcr-versions.json)
            echo "Computed build version: ${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Save version metadata
        if: steps.compute.outputs.publish_now == 'true'
        env:
          BUILD_VERSION: ${{ steps.compute.outputs.version }}
          GIT_SHA: ${{ github.sha }}
        run: |
          echo "VERSION=${BUILD_VERSION}" > version.txt
          echo "GIT_SHA=${GIT_SHA}" >> version.txt

      - name: Upload version artifact
        if: steps.compute.outputs.publish_now == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: version
          path: version.txt
          retention-days: 1

  osv-scan:
    name: OSV-Scanner (dependency vulnerability scan)
    # Closes the audit gap pip-audit doesn't cover: requirements/package-lock.json
    # (Bootstrap, HTMX, Leaflet, etc.) and requirements/*.txt. The overlap with
    # pip-audit on the Python side is intentional defence in depth. Uses Google's
    # official reusable workflow rather than calling the underlying composite
    # actions directly, per their own recommendation (behaviour there isn't
    # guaranteed stable across minor releases).
    needs: [version]
    if: needs.version.result == 'success'
    permissions:
      actions: read           # required by codeql-action to upload SARIF
      contents: read          # checkout
      security-events: write  # upload SARIF results to the Security tab
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8

  docker-build-amd64:
    name: Build linux/amd64 image
    # Builds linux/amd64, exports a tarball for docker-validate and e2e.
    # Every build reads the shared registry-based layer cache; only a
    # publish_now run also writes to it and pushes the result to GHCR as
    # :sha-<SHA>-amd64 for publish to assemble into the final manifest — a
    # plain validation run (external PR, WIP branch) has nothing downstream
    # that needs a pushed image, just the local tarball.
    needs: [version]
    if: needs.version.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      packages: write   # GHCR push (publish_now only)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VERSION: ${{ needs.version.outputs.version }}
      GIT_SHA: ${{ github.sha }}
      PUBLISH_NOW: ${{ needs.version.outputs.publish_now }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: docker/Dockerfile

      - name: Embed version into admin UI template
        run: |
          sed -i "s/Development version/version ${VERSION}/" \
            app/templates/config/settings.html

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Logging in before the build (rather than after, as previously) so the
      # build step itself can push cache layers via --cache-to — that needs
      # registry write access, unlike the read-only --cache-from every run
      # uses (works unauthenticated against this public package).
      - name: Log in to GitHub Container Registry
        if: env.PUBLISH_NOW == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image (linux/amd64)
        run: |
          CACHE_ARGS=(--cache-from "type=registry,ref=ghcr.io/e2jk/openhangar:buildcache-amd64")
          if [ "${PUBLISH_NOW}" = "true" ]; then
            CACHE_ARGS+=(--cache-to "type=registry,ref=ghcr.io/e2jk/openhangar:buildcache-amd64,mode=max")
          fi
          docker buildx build \
            --platform linux/amd64 \
            --build-arg VERSION="${VERSION}" \
            -f docker/Dockerfile \
            -t openhangar:ci \
            -t "ghcr.io/e2jk/openhangar:sha-${GIT_SHA}-amd64" \
            "${CACHE_ARGS[@]}" \
            --load .

      - name: Export image as compressed tarball
        run: docker save openhangar:ci | gzip > openhangar-ci.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openhangar-ci
          path: openhangar-ci.tar.gz
          retention-days: 1

      - name: Push linux/amd64 image to GHCR
        if: env.PUBLISH_NOW == 'true'
        run: docker push "ghcr.io/e2jk/openhangar:sha-${GIT_SHA}-amd64"

  docker-build-arm64:
    name: Build linux/arm64 image
    # Builds and pushes :sha-<SHA>-arm64 to GHCR — only needed when this run
    # will actually publish (publish_now); nothing else in the pipeline
    # tests against arm64, so a plain validation run has no use for it.
    # publish uses imagetools to merge both platform images into the final
    # multi-platform manifest — no build happens in publish itself.
    needs: [version]
    if: needs.version.outputs.publish_now == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45   # QEMU cross-build is slow
    permissions:
      packages: write   # GHCR push
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VERSION: ${{ needs.version.outputs.version }}
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Embed version into admin UI template
        run: |
          sed -i "s/Development version/version ${VERSION}/" \
            app/templates/config/settings.html

      - name: Set up QEMU (required for arm64 cross-build)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/arm64 image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --build-arg VERSION="${VERSION}" \
            -f docker/Dockerfile \
            -t "ghcr.io/e2jk/openhangar:sha-${GIT_SHA}-arm64" \
            --cache-from "type=registry,ref=ghcr.io/e2jk/openhangar:buildcache-arm64" \
            --cache-to "type=registry,ref=ghcr.io/e2jk/openhangar:buildcache-arm64,mode=max" \
            --push .

  docker-validate:
    name: Validate Docker image (migrations, backup, smoke test, ZAP, Trivy)
    # Loads the amd64 image from docker-build-amd64 and runs all Docker-level validation:
    # migration integrity, backup smoke test, demo smoke test, ZAP, Trivy.
    # This is the exact image publish (if this run reaches it) tags :latest
    # and releases — there's no separate rebuild to re-validate afterward.
    # SBOM generation happens inline in publish (publish_now only), not a
    # separate job — it needs the final, correctly-versioned image.
    needs: [version, docker-build-amd64]
    if: needs.version.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write  # ZAP/Trivy SARIF upload
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: openhangar-ci

      - name: Load Docker image
        run: gunzip -c openhangar-ci.tar.gz | docker load

      - name: Test database migrations
        run: |
          docker network create migtest-net
          docker run -d --name migtest-db --network migtest-net \
            -e POSTGRES_DB=openhangar \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            postgres:18-alpine
          until docker exec migtest-db pg_isready -U postgres 2>/dev/null; do sleep 1; done

          docker run --rm --network migtest-net \
            --entrypoint python \
            -e OPENHANGAR_DATABASE_URL="postgresql://postgres:postgres@migtest-db:5432/openhangar" \
            -e OPENHANGAR_ENV=production \
            -e OPENHANGAR_SECRET_KEY=migtest-ci-not-for-production-use-only \
            openhangar:ci docker-init-db.py

          docker run --rm --network migtest-net \
            --entrypoint flask \
            -e OPENHANGAR_DATABASE_URL="postgresql://postgres:postgres@migtest-db:5432/openhangar" \
            -e OPENHANGAR_ENV=production \
            -e OPENHANGAR_SECRET_KEY=migtest-ci-not-for-production-use-only \
            -e FLASK_APP=init:create_app \
            openhangar:ci db check

          docker rm -f migtest-db
          docker network rm migtest-net

      - name: Smoke-test backup (pg_dump end-to-end)
        env:
          CI_BACKUPS_DIR: ${{ runner.temp }}/ci-backups
        run: |
          # 777: this bind-mount is written to by appuser (uid 1000) inside
          # the container, but created here by the runner user (uid 1001 on
          # GitHub-hosted runners) — mkdir's default mode leaves it
          # owner-only-writable, so appuser can't write into it without this.
          # Ephemeral CI scratch dir on a throwaway runner; nothing sensitive
          # persists past the job.
          mkdir -p "$CI_BACKUPS_DIR"
          chmod 777 "$CI_BACKUPS_DIR"

          docker network create backup-test-net
          docker run -d --name backup-test-db --network backup-test-net \
            -e POSTGRES_DB=openhangar \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            postgres:18-alpine
          until docker exec backup-test-db pg_isready -U postgres 2>/dev/null; do sleep 1; done

          docker run --rm --network backup-test-net \
            --entrypoint python \
            -e OPENHANGAR_DATABASE_URL="postgresql://postgres:postgres@backup-test-db:5432/openhangar" \
            -e OPENHANGAR_ENV=production \
            -e OPENHANGAR_SECRET_KEY=backuptest-ci-not-for-production-use-only \
            openhangar:ci docker-init-db.py

          # Backup folder is bind-mounted (not ephemeral container storage) so
          # the encrypted archive survives into the restore smoke test below.
          output=$(docker run --rm --network backup-test-net \
            --entrypoint flask \
            -v "${CI_BACKUPS_DIR}:/tmp/backups" \
            -e OPENHANGAR_DATABASE_URL="postgresql://postgres:postgres@backup-test-db:5432/openhangar" \
            -e OPENHANGAR_ENV=production \
            -e OPENHANGAR_SECRET_KEY=backuptest-ci-not-for-production-use-only \
            -e OPENHANGAR_BACKUP_ENCRYPTION_KEY=ci-test-key \
            -e FLASK_APP=init:create_app \
            -e OPENHANGAR_BACKUP_FOLDER=/tmp/backups \
            openhangar:ci backup-now)
          echo "$output"
          if ! echo "$output" | grep -q "Backup OK:"; then
            echo "::error::Backup smoke test failed — expected 'Backup OK:' in output"
            exit 1
          fi
          echo "Backup smoke test passed."

          archive_name=$(echo "$output" | grep -oP 'Backup OK: \K[^ ]+(?= \()')
          echo "ARCHIVE_NAME=${archive_name}" >> "$GITHUB_ENV"

          docker rm -f backup-test-db
          docker network rm backup-test-net

      - name: Smoke-test restore (psql end-to-end)
        # Exercises the actual restore code path (flask restore-backup, which
        # invokes psql via subprocess — see app/init.py) against the archive
        # the previous step just produced. The backup smoke test above only
        # ever proves pg_dump works; nothing previously exercised psql restore.
        env:
          CI_BACKUPS_DIR: ${{ runner.temp }}/ci-backups
        run: |
          docker network create restore-test-net
          docker run -d --name restore-test-db --network restore-test-net \
            -e POSTGRES_DB=openhangar \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            postgres:18-alpine
          until docker exec restore-test-db pg_isready -U postgres 2>/dev/null; do sleep 1; done

          docker run --rm --network restore-test-net \
            --entrypoint python \
            -e OPENHANGAR_DATABASE_URL="postgresql://postgres:postgres@restore-test-db:5432/openhangar" \
            -e OPENHANGAR_ENV=production \
            -e OPENHANGAR_SECRET_KEY=restoretest-ci-not-for-production-use-only \
            openhangar:ci docker-init-db.py

          output=$(docker run --rm --network restore-test-net \
            --entrypoint flask \
            -v "${CI_BACKUPS_DIR}:/tmp/backups:ro" \
            -e OPENHANGAR_DATABASE_URL="postgresql://postgres:postgres@restore-test-db:5432/openhangar" \
            -e OPENHANGAR_ENV=production \
            -e OPENHANGAR_SECRET_KEY=restoretest-ci-not-for-production-use-only \
            -e OPENHANGAR_RESTORE_ENCRYPTION_KEY=ci-test-key \
            -e FLASK_APP=init:create_app \
            openhangar:ci restore-backup "/tmp/backups/${ARCHIVE_NAME}")
          echo "$output"
          if ! echo "$output" | grep -q "Restore complete."; then
            echo "::error::Restore smoke test failed — expected 'Restore complete.' in output"
            exit 1
          fi
          echo "Restore smoke test passed."

          docker rm -f restore-test-db
          docker network rm restore-test-net

      - name: Smoke-test Docker image (demo mode)
        # Leaves smoke-web/smoke-db/smoke-net running afterward — the ZAP
        # scan below targets the still-running web container.
        run: bash .github/scripts/smoke_test.sh openhangar:ci

      - name: OWASP ZAP baseline scan
        # Scans the smoke container (still running on localhost:5001) for OWASP
        # regressions: CSP, security headers, CSRF, open redirects, etc.
        # Suppressions for known false positives are in .zap/rules.tsv.
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:5001'
          rules_file_name: '.zap/rules.tsv'
          fail_action: 'true'
          allow_issue_writing: 'false'
          artifact_name: zap-baseline-results

      - name: Convert ZAP JSON report to SARIF
        if: always() && hashFiles('report_json.json') != ''
        run: python3 .github/scripts/zap_to_sarif.py report_json.json zap-results.sarif .zap/rules.tsv

      - name: Upload ZAP SARIF to GitHub Security tab
        if: always() && hashFiles('zap-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          sarif_file: zap-results.sarif
          category: zap

      - name: Run Trivy vulnerability scanner
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: openhangar:ci
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: 'true'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security tab
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Check for newly introduced vulnerabilities
        run: |
          trivy image --format json --severity HIGH,CRITICAL --ignore-unfixed \
            --quiet openhangar:ci > /tmp/trivy-new.json

          if docker pull ghcr.io/e2jk/openhangar:latest 2>/dev/null; then
            HAS_BASELINE=true
            trivy image --format json --severity HIGH,CRITICAL --ignore-unfixed \
              --quiet ghcr.io/e2jk/openhangar:latest > /tmp/trivy-baseline.json
          else
            HAS_BASELINE=false
          fi

          export HAS_BASELINE
          python3 .github/scripts/trivy_diff.py

  browser-tests-seeded:
    name: Browser tests (seeded — ${{ matrix.suite }})
    # Runs the seeded suite split across two matrix legs, purely to shorten
    # the CI critical path: 'crawl' runs test_crawl.py (~80% of the seeded
    # suite's test count — the generic route crawler, one dot per route);
    # 'rest' runs everything else in the seeded suite except test_crawl.py
    # and test_setup_flow.py (see browser-tests-fresh-db) —
    # test_access_control.py, test_htmx_boost.py, test_ui_interactions.py.
    # Each leg gets its own disposable Postgres, so there's no shared state
    # between them (verified: no cross-file imports; the only destructive
    # rows either file touches — fe_del1/fe_del2 — are only ever mutated
    # within test_ui_interactions.py itself). Runs in parallel with
    # docker-validate and browser-tests-fresh-db after docker-build completes.
    needs: [version, docker-build-amd64]
    if: needs.version.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        suite: [crawl, rest]
        include:
          - suite: crawl
            pytest_args: tests/e2e/test_crawl.py
          - suite: rest
            pytest_args: "tests/e2e/ --ignore=tests/e2e/test_crawl.py --ignore=tests/e2e/test_setup_flow.py"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      E2E_DB: e2e-${{ matrix.suite }}-db
      E2E_WEB: e2e-${{ matrix.suite }}-web
      E2E_NET: e2e-${{ matrix.suite }}-net
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: requirements/ci.txt

      - name: Set up venv
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet --require-hashes -r requirements/ci.txt

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-1.61.0

      - name: Install Playwright Chromium browser and OS dependencies
        # With a warm cache the browser download is a no-op; only the (fast,
        # uncacheable) apt deps run.
        run: .venv/bin/playwright install chromium --with-deps

      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: openhangar-ci

      - name: Load Docker image
        run: gunzip -c openhangar-ci.tar.gz | docker load

      - name: Start E2E environment (PostgreSQL + app in development mode)
        # FLASK_ENV=development causes the container to apply migrations and the
        # dev seed automatically on startup — no separate seeding step needed.
        run: |
          docker network create "$E2E_NET"

          docker run -d --name "$E2E_DB" --network "$E2E_NET" \
            -p 5432:5432 \
            -e POSTGRES_DB=openhangar \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            postgres:18-alpine

          docker run -d --name "$E2E_WEB" --network "$E2E_NET" \
            -p 5000:5000 \
            -e OPENHANGAR_DATABASE_URL="postgresql://postgres:postgres@$E2E_DB:5432/openhangar" \
            -e OPENHANGAR_DB_HOST="$E2E_DB" \
            -e OPENHANGAR_ENV=development \
            -e OPENHANGAR_SECRET_KEY=e2e-ci-secret-not-for-production-use-only \
            -e OPENHANGAR_RATELIMIT_ENABLED=false \
            openhangar:ci

      - name: Wait for E2E environment to become healthy
        run: |
          echo "Waiting for PostgreSQL..."
          until docker exec "$E2E_DB" pg_isready -U postgres 2>/dev/null; do sleep 1; done
          echo "Waiting for web app (applies dev seed on startup)..."
          start=$SECONDS
          deadline=$((start + 180))
          while [ $SECONDS -lt $deadline ]; do
            status=$(docker inspect --format='{{.State.Health.Status}}' "$E2E_WEB" 2>/dev/null || echo "starting")
            echo "  [t+$((SECONDS - start))s] health=${status}"
            [ "$status" = "healthy" ] && break
            if [ "$status" = "unhealthy" ]; then
              echo "::error::$E2E_WEB became unhealthy"
              docker logs "$E2E_WEB"
              exit 1
            fi
            sleep 2
          done
          final=$(docker inspect --format='{{.State.Health.Status}}' "$E2E_WEB")
          if [ "$final" != "healthy" ]; then
            echo "::error::$E2E_WEB did not become healthy within 180 s (status: ${final})"
            docker logs "$E2E_WEB"
            exit 1
          fi
          echo "E2E environment ready."

      - name: Generate E2E route inventory and seed data
        # generate_routes.py connects to the app's PostgreSQL (exposed on localhost:5432)
        # and writes routes.json (all resolvable URLs) and seed.json (resource IDs).
        # Both files are consumed by the Playwright test suite.
        env:
          OPENHANGAR_ENV: development
        run: |
          .venv/bin/python scripts/generate_routes.py \
            --db-url "postgresql://postgres:postgres@localhost:5432/openhangar" \
            --seed-out tests/e2e/seed.json

      - name: Run E2E tests (${{ matrix.suite }})
        env:
          E2E_BASE_URL: http://localhost:5000
          E2E_ALLOW_DESTRUCTIVE: "1"
          PYTEST_ARGS: ${{ matrix.pytest_args }}
        # PYTEST_ARGS intentionally expands unquoted — it carries multiple
        # space-separated pytest arguments (path + --ignore flags for the
        # 'rest' leg), not a single token.
        run: |
          # shellcheck disable=SC2086
          .venv/bin/pytest --e2e ${PYTEST_ARGS} --override-ini='addopts='

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== $E2E_WEB logs ==="
          docker logs "$E2E_WEB" || true
          echo "=== $E2E_DB logs ==="
          docker logs "$E2E_DB" || true

      - name: Tear down E2E environment
        if: always()
        run: |
          docker rm -f "$E2E_WEB" "$E2E_DB" 2>/dev/null || true
          docker network rm "$E2E_NET" 2>/dev/null || true

  browser-tests-fresh-db:
    name: Browser tests (fresh, unseeded DB — setup flow)
    # Runs test_setup_flow.py (the empty-DB / first-run setup wizard tests)
    # against the freshly built Docker image running in *production* mode
    # against its own disposable, unseeded Postgres. Production mode skips
    # the dev auto-seed entirely (see docker-init-db.py: seeding only runs
    # under OPENHANGAR_ENV=development), so the container boots with zero
    # users — exactly what these tests need — without resorting to the
    # in-process SQLite fallback tests/e2e/conftest.py uses locally.
    # Runs in parallel with docker-validate and browser-tests-seeded (both
    # matrix legs) after docker-build completes.
    needs: [version, docker-build-amd64]
    if: needs.version.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FRESHDB_DB: freshdb-db
      FRESHDB_WEB: freshdb-web
      FRESHDB_NET: freshdb-net
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: requirements/ci.txt

      - name: Set up venv
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet --require-hashes -r requirements/ci.txt

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-1.61.0

      - name: Install Playwright Chromium browser and OS dependencies
        # With a warm cache the browser download is a no-op; only the (fast,
        # uncacheable) apt deps run.
        run: .venv/bin/playwright install chromium --with-deps

      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: openhangar-ci

      - name: Load Docker image
        run: gunzip -c openhangar-ci.tar.gz | docker load

      - name: Start fresh (unseeded) environment (PostgreSQL + app in production mode)
        run: |
          docker network create "$FRESHDB_NET"

          docker run -d --name "$FRESHDB_DB" --network "$FRESHDB_NET" \
            -p 5432:5432 \
            -e POSTGRES_DB=openhangar \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            postgres:18-alpine

          docker run -d --name "$FRESHDB_WEB" --network "$FRESHDB_NET" \
            -p 5000:5000 \
            -e OPENHANGAR_DATABASE_URL="postgresql://postgres:postgres@$FRESHDB_DB:5432/openhangar" \
            -e OPENHANGAR_DB_HOST="$FRESHDB_DB" \
            -e OPENHANGAR_ENV=production \
            -e OPENHANGAR_SECRET_KEY=freshdb-ci-secret-not-for-production-use-only \
            -e OPENHANGAR_RATELIMIT_ENABLED=false \
            openhangar:ci

      - name: Wait for fresh environment to become healthy
        run: |
          echo "Waiting for PostgreSQL..."
          until docker exec "$FRESHDB_DB" pg_isready -U postgres 2>/dev/null; do sleep 1; done
          echo "Waiting for web app (migrations only — production mode does not seed)..."
          start=$SECONDS
          deadline=$((start + 180))
          while [ $SECONDS -lt $deadline ]; do
            status=$(docker inspect --format='{{.State.Health.Status}}' "$FRESHDB_WEB" 2>/dev/null || echo "starting")
            echo "  [t+$((SECONDS - start))s] health=${status}"
            [ "$status" = "healthy" ] && break
            if [ "$status" = "unhealthy" ]; then
              echo "::error::$FRESHDB_WEB became unhealthy"
              docker logs "$FRESHDB_WEB"
              exit 1
            fi
            sleep 2
          done
          final=$(docker inspect --format='{{.State.Health.Status}}' "$FRESHDB_WEB")
          if [ "$final" != "healthy" ]; then
            echo "::error::$FRESHDB_WEB did not become healthy within 180 s (status: ${final})"
            docker logs "$FRESHDB_WEB"
            exit 1
          fi
          echo "Fresh environment ready."

      - name: Run setup-flow E2E tests
        env:
          E2E_SETUP_FLOW_BASE_URL: http://localhost:5000
          E2E_SETUP_FLOW_DB_URL: postgresql://postgres:postgres@localhost:5432/openhangar
        run: .venv/bin/pytest --e2e tests/e2e/test_setup_flow.py --override-ini='addopts='

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== $FRESHDB_WEB logs ==="
          docker logs "$FRESHDB_WEB" || true
          echo "=== $FRESHDB_DB logs ==="
          docker logs "$FRESHDB_DB" || true

      - name: Tear down fresh environment
        if: always()
        run: |
          docker rm -f "$FRESHDB_WEB" "$FRESHDB_DB" 2>/dev/null || true
          docker network rm "$FRESHDB_NET" 2>/dev/null || true

  publish:
    name: Publish release (GHCR manifest, sign, attest, GitHub Release, Pages)
    needs: [version, lint-and-test, docker-validate, browser-tests-seeded, browser-tests-fresh-db, docker-build-amd64, docker-build-arm64, osv-scan]
    # Every job listed in needs: shares the same if: needs.version.result ==
    # 'success' condition (or is unconditional), so whenever publish_now is
    # true they're all genuinely running to completion, never skipped —
    # unlike the old design (where docker-validate/browser-tests/osv-scan
    # were *deliberately* skipped on a "promote" run, which required
    # explicit success-or-skipped handling here to avoid the implicit
    # "every need must have succeeded" gate silently blocking this job).
    # That whole class of trap doesn't apply any more: a plain success
    # check on every need is both correct and exactly what the implicit
    # gate already enforces.
    if: |
      needs.version.outputs.publish_now == 'true' &&
      needs.lint-and-test.result == 'success' &&
      needs.docker-validate.result == 'success' &&
      needs.browser-tests-seeded.result == 'success' &&
      needs.browser-tests-fresh-db.result == 'success' &&
      needs.docker-build-amd64.result == 'success' &&
      needs.docker-build-arm64.result == 'success' &&
      needs.osv-scan.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GIT_SHA: ${{ github.sha }}
    permissions:
      contents: write       # gh release create
      packages: write       # docker buildx imagetools create / push
      pages: write          # deploy-pages
      id-token: write       # OIDC token for cosign keyless signing, attestations, and deploy-pages
      attestations: write   # attest-build-provenance (image + SBOM)
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Download version artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: version

      - name: Read version
        run: |
          VERSION=$(grep '^VERSION=' version.txt | cut -d= -f2)
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Publishing version: ${VERSION}"

      # No local image load or smoke test here: docker-validate already ran
      # the full validation suite (migrations, backup/restore, smoke test,
      # ZAP, Trivy) against this exact SHA-tagged image — the one imagetools
      # assembles into the final manifest below is not a rebuild.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble and push multi-platform manifest (imagetools, no build)
        run: |
          SHORT_SHA=$(echo "${GIT_SHA}" | cut -c1-7)
          docker buildx imagetools create \
            --tag "ghcr.io/e2jk/openhangar:${VERSION}" \
            --tag ghcr.io/e2jk/openhangar:latest \
            --tag "ghcr.io/e2jk/openhangar:sha-${SHORT_SHA}" \
            "ghcr.io/e2jk/openhangar:sha-${GIT_SHA}-amd64" \
            "ghcr.io/e2jk/openhangar:sha-${GIT_SHA}-arm64"

      - name: Get image digest
        id: image-digest
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            "ghcr.io/e2jk/openhangar:${VERSION}" \
            --format '{{.Manifest.Digest}}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest Docker image provenance (GitHub attestations)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ghcr.io/e2jk/openhangar
          subject-digest: ${{ steps.image-digest.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign Docker image with cosign (keyless)
        env:
          IMAGE_DIGEST: ${{ steps.image-digest.outputs.digest }}
        run: |
          cosign sign --yes \
            "ghcr.io/e2jk/openhangar@${IMAGE_DIGEST}"

      - name: Generate SBOM (CycloneDX) and submit dependency snapshot
        # Generated against the final tagged manifest above (a registry
        # pull, not a rebuild). contents:write (already granted to this job,
        # for gh release create) is what the dependency-snapshot submission
        # needs.
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/e2jk/openhangar:${{ env.VERSION }}
          format: cyclonedx-json
          output-file: sbom-${{ github.sha }}.cyclonedx.json
          upload-artifact: false
          dependency-snapshot: true

      - name: Sign SBOM with cosign (Sigstore bundle for OpenSSF Scorecard)
        run: |
          cosign sign-blob --yes \
            --bundle "sbom-${GIT_SHA}.cyclonedx.json.sigstore.json" \
            "sbom-${GIT_SHA}.cyclonedx.json"

      - name: Attest SBOM provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: sbom-${{ github.sha }}.cyclonedx.json

      - name: Download SBOM provenance bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # gh attestation download writes a file named after the artifact digest.
          # Snapshot existing .jsonl files, run the download, then find the new one.
          find . -maxdepth 1 -name '*.jsonl' | sort > /tmp/before.txt
          gh attestation download "sbom-${GIT_SHA}.cyclonedx.json" \
            --repo "${REPO}"
          find . -maxdepth 1 -name '*.jsonl' | sort > /tmp/after.txt
          BUNDLE=$(comm -13 /tmp/before.txt /tmp/after.txt | head -1)
          mv "$BUNDLE" "sbom-${GIT_SHA}.cyclonedx.json.intoto.jsonl"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/${REPO}/releases/generate-notes" \
            --method POST \
            --field tag_name="v${VERSION}" \
            --field target_commitish="${GIT_SHA}" \
            --jq '.body' > /tmp/auto-notes.md
          {
            # shellcheck disable=SC2016  # backticks are literal markdown code-fences, not command substitution
            printf '## Docker Image\n\n```\ndocker pull ghcr.io/e2jk/openhangar:%s\n```\n\n' "${VERSION}"
            cat /tmp/auto-notes.md
          } > /tmp/release-notes.md
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            "sbom-${GIT_SHA}.cyclonedx.json#SBOM (CycloneDX JSON)" \
            "sbom-${GIT_SHA}.cyclonedx.json.sigstore.json#SBOM signature (Sigstore)" \
            "sbom-${GIT_SHA}.cyclonedx.json.intoto.jsonl#SBOM provenance (SLSA)"

      - name: Download site content artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: pages-content
          path: _site

      - name: Update versions.json
        run: |
          # Fetch existing versions list from GitHub Pages; fall back to empty array
          curl -sf https://e2jk.github.io/OpenHangar/versions.json \
            -o /tmp/versions-existing.json 2>/dev/null \
            || echo '[]' > /tmp/versions-existing.json
          python3 - "${VERSION}" <<'PYEOF'
          import json, sys
          version = sys.argv[1]
          try:
              with open('/tmp/versions-existing.json') as f:
                  versions = json.load(f)
              if not isinstance(versions, list):
                  versions = []
          except Exception:
              versions = []
          if version not in versions:
              versions.insert(0, version)
          with open('_site/versions.json', 'w') as f:
              json.dump(versions, f)
          print(f"versions.json updated: {versions}")
          PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
