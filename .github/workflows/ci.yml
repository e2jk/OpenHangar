name: CI

on:
  push:
  pull_request:

permissions: read-all

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Set up venv
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet --require-hashes -r .github/requirements-ci.txt

      - name: Lint with Ruff
        run: .venv/bin/ruff check .

      - name: Check formatting with Ruff
        run: .venv/bin/ruff format --check .

      - name: Type-check with mypy
        run: .venv/bin/mypy app/

      - name: Security scan with bandit
        run: .venv/bin/bandit -r app/ -lll -i --exclude app/tests

      - name: Audit production dependencies
        run: .venv/bin/pip-audit -r docker/docker-requirements.txt

      - name: Check translations are up to date
        run: |
          .venv/bin/pybabel extract -F babel.cfg -o /tmp/messages_ci.pot .
          fail=0
          for lang in $(find app/translations -mindepth 1 -maxdepth 1 -type d -exec basename {} \;); do
            mkdir -p /tmp/trans_check/$lang/LC_MESSAGES
            cp app/translations/$lang/LC_MESSAGES/messages.po /tmp/trans_check/$lang/LC_MESSAGES/
            .venv/bin/pybabel update -i /tmp/messages_ci.pot -d /tmp/trans_check -l $lang --no-fuzzy-matching
            count=$(.venv/bin/python -c "
          import polib
          po = polib.pofile('/tmp/trans_check/$lang/LC_MESSAGES/messages.po')
          print(len(po.untranslated_entries()))
          ")
            if [ "$count" -gt 0 ]; then
              echo "::error::$count untranslated $lang string(s) — run pybabel extract+update, translate them, and commit messages.po."
              fail=1
            fi
          done
          if [ "$fail" -eq 0 ]; then
            echo "All translations are up to date."
          else
            exit 1
          fi

      - name: Compile translations
        run: .venv/bin/pybabel compile -d app/translations

      - name: Run tests
        run: .venv/bin/pytest

      - name: Generate coverage badge
        run: |
          .venv/bin/genbadge coverage \
            -i coverage.xml \
            -o htmlcov/badge.svg

      - name: Assemble Pages site
        run: |
          mkdir -p _site/coverage
          cp -r htmlcov/. _site/coverage/
          cp -r app/static _site/static
          # Extract repo URL (first GitHub URL in README) and demo site URL
          REPO_URL=$(grep -oP 'https://github\.com/[^/]+/[^/)]+' README.md | head -1)
          DEMO_SITE_URL=$(grep 'Try the demo' README.md | grep -oP 'https://[^)]+' | tail -1)
          if [ -z "$DEMO_SITE_URL" ]; then
            echo "WARNING: No demo site URL found in README.md — demo button will not appear on GitHub Pages."
          fi
          DATABASE_URL=sqlite:///:memory: SECRET_KEY=ci-pages REPO_URL="$REPO_URL" DEMO_SITE_URL="$DEMO_SITE_URL" \
            .venv/bin/python - <<'PYEOF'
          import sys
          sys.path.insert(0, 'app')
          from init import create_app
          app = create_app()
          app.config['TESTING'] = True
          with app.app_context():
              from models import db
              db.create_all()
          with app.test_client() as c:
              html = c.get('/').data.decode('utf-8')
          # Rewrite Flask absolute static paths to relative for GitHub Pages
          html = html.replace('href="/static/', 'href="static/')
          html = html.replace('src="/static/', 'src="static/')
          with open('_site/index.html', 'w') as f:
              f.write(html)
          PYEOF

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: _site

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: docker/Dockerfile

      - name: Compute build version
        run: |
          VERSION=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/e2jk/packages/container/openhangar/versions?per_page=100" | \
            python3 .github/scripts/next_semver.py)
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Computed build version: ${VERSION}"

      - name: Embed version into admin UI template
        run: |
          sed -i "s/Development version/version ${VERSION}/" \
            app/templates/config/settings.html

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VERSION="${VERSION}" \
            -f docker/Dockerfile \
            -t openhangar:ci .

      - name: Smoke-test Docker image (demo mode)
        env:
          SMOKE_DB: smoke-db
          SMOKE_DB_NAME: smokedb
          SMOKE_DB_USER: smokeuser
          SMOKE_DB_PASS: smokepass
          SMOKE_WEB: smoke-web
        run: |
          docker network create smoke-net
          docker run -d --name "$SMOKE_DB" --network smoke-net \
            -e POSTGRES_DB="$SMOKE_DB_NAME" \
            -e POSTGRES_USER="$SMOKE_DB_USER" \
            -e POSTGRES_PASSWORD="$SMOKE_DB_PASS" \
            postgres:18-alpine

          docker run -d --name "$SMOKE_WEB" --network smoke-net \
            -e DATABASE_URL="postgresql://$SMOKE_DB_USER:$SMOKE_DB_PASS@$SMOKE_DB:5432/$SMOKE_DB_NAME" \
            -e DB_HOST="$SMOKE_DB" \
            -e FLASK_ENV=demo \
            -e SECRET_KEY=smoke-ci-secret \
            openhangar:ci

          echo "Waiting up to 120 s for $SMOKE_WEB to become healthy..."
          start=$SECONDS
          deadline=$((start + 120))
          while [ $SECONDS -lt $deadline ]; do
            status=$(docker inspect --format='{{.State.Health.Status}}' "$SMOKE_WEB")
            echo "  [t+$((SECONDS - start))s] health=${status}"
            [ "$status" = "healthy" ] && break
            [ "$status" = "unhealthy" ] && break
            sleep 1
          done

          final=$(docker inspect --format='{{.State.Health.Status}}' "$SMOKE_WEB")
          if [ "$final" != "healthy" ]; then
            echo "::error::$SMOKE_WEB did not become healthy within 120 s (final status: ${final})"
            echo "=== $SMOKE_WEB logs ==="
            docker logs "$SMOKE_WEB"
            exit 1
          fi
          echo "Smoke test passed — container is healthy."

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: openhangar:ci
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: 'true'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Check for newly introduced vulnerabilities
        run: |
          trivy image --format json --severity HIGH,CRITICAL --ignore-unfixed \
            --quiet openhangar:ci > /tmp/trivy-new.json

          if docker pull ghcr.io/e2jk/openhangar:latest 2>/dev/null; then
            HAS_BASELINE=true
            trivy image --format json --severity HIGH,CRITICAL --ignore-unfixed \
              --quiet ghcr.io/e2jk/openhangar:latest > /tmp/trivy-baseline.json
          else
            HAS_BASELINE=false
          fi

          export HAS_BASELINE
          python3 .github/scripts/trivy_diff.py

      - name: Generate SBOM (CycloneDX)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: openhangar:ci
          format: cyclonedx-json
          artifact-name: sbom-${{ github.sha }}.cyclonedx.json
          upload-artifact: true

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push immutable SHA tag to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker tag openhangar:ci ghcr.io/e2jk/openhangar:sha-${{ github.sha }}
          docker push ghcr.io/e2jk/openhangar:sha-${{ github.sha }}

      - name: Save version metadata
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "VERSION=${VERSION}" > version.txt
          echo "GIT_SHA=${{ github.sha }}" >> version.txt

      - name: Upload version artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: version
          path: version.txt
          retention-days: 1

  publish:
    needs: [tests, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      packages: write
      pages: write
      id-token: write
      security-events: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download version artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: version

      - name: Read version
        run: |
          VERSION=$(grep '^VERSION=' version.txt | cut -d= -f2)
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Publishing version: ${VERSION}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag and push semver, latest, and short-SHA
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker pull ghcr.io/e2jk/openhangar:sha-${{ github.sha }}
          docker tag ghcr.io/e2jk/openhangar:sha-${{ github.sha }} ghcr.io/e2jk/openhangar:${VERSION}
          docker tag ghcr.io/e2jk/openhangar:sha-${{ github.sha }} ghcr.io/e2jk/openhangar:latest
          docker tag ghcr.io/e2jk/openhangar:sha-${{ github.sha }} ghcr.io/e2jk/openhangar:sha-${SHORT_SHA}
          docker push ghcr.io/e2jk/openhangar:${VERSION}
          docker push ghcr.io/e2jk/openhangar:latest
          docker push ghcr.io/e2jk/openhangar:sha-${SHORT_SHA}

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
