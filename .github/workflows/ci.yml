name: CI

run-name: ${{ startsWith(github.ref, 'refs/tags/v') && format('Publishing version {0}', github.ref_name) || github.event.head_commit.message || github.ref_name }}

on:
  push:
  pull_request:

permissions: read-all

# Serialise main-push runs so each version computation sees the previous
# publish already in GHCR. PR runs stay independent (group = run ID).
concurrency:
  group: ${{ ((github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push') && 'main-publish' || github.run_id }}
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Set up venv
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet --require-hashes -r requirements/ci.txt

      - name: Check migration chain integrity
        run: .venv/bin/python scripts/check_migrations.py

      - name: Lint with Ruff
        run: .venv/bin/ruff check .

      - name: Check formatting with Ruff
        run: .venv/bin/ruff format --check .

      - name: Type-check with mypy
        run: .venv/bin/mypy app/

      - name: Security scan with bandit
        run: .venv/bin/bandit -r app/ -lll -i --exclude app/tests

      - name: Audit all dependencies (runtime + transitive)
        run: .venv/bin/pip-audit --local

      - name: Check translations are up to date
        run: |
          bash scripts/update_i18n.sh
          fail=0
          for lang in $(find app/translations -mindepth 1 -maxdepth 1 -type d -exec basename {} \;); do
            count=$(.venv/bin/python -c "
          import polib
          po = polib.pofile('app/translations/$lang/LC_MESSAGES/messages.po')
          print(len(po.untranslated_entries()))
          ")
            if [ "$count" -gt 0 ]; then
              echo "::error::$count untranslated $lang string(s) — run bash scripts/update_i18n.sh, translate them, and commit messages.po."
              fail=1
            fi
          done
          if [ "$fail" -eq 0 ]; then
            echo "All translations are up to date."
          else
            exit 1
          fi

      - name: Run tests
        run: bash scripts/run-tests-with-coverage.sh

      - name: Generate coverage badge
        run: |
          .venv/bin/genbadge coverage \
            -i coverage.xml \
            -o htmlcov/badge.svg

      - name: Assemble Pages site
        run: |
          mkdir -p _site/coverage
          cp -r htmlcov/. _site/coverage/
          cp -r app/static _site/static
          # Extract repo URL (first GitHub URL in README) and demo site URL
          REPO_URL=$(grep -oP 'https://github\.com/[^/]+/[^/)]+' README.md | head -1)
          DEMO_SITE_URL=$(grep 'Try the demo' README.md | grep -oP 'https://[^)]+' | tail -1)
          if [ -z "$DEMO_SITE_URL" ]; then
            echo "WARNING: No demo site URL found in README.md — demo button will not appear on GitHub Pages."
          fi
          DATABASE_URL=sqlite:///:memory: SECRET_KEY=ci-pages-not-for-production-use-only REPO_URL="$REPO_URL" DEMO_SITE_URL="$DEMO_SITE_URL" \
            .venv/bin/python - <<'PYEOF'
          import sys
          sys.path.insert(0, 'app')
          from init import create_app
          app = create_app()
          app.config['TESTING'] = True
          with app.app_context():
              from models import db
              db.create_all()
          with app.test_client() as c:
              html = c.get('/').data.decode('utf-8')
          # Rewrite Flask absolute static paths to relative for GitHub Pages
          html = html.replace('href="/static/', 'href="static/')
          html = html.replace('src="/static/', 'src="static/')
          with open('_site/index.html', 'w') as f:
              f.write(html)
          PYEOF

      - name: Upload Pages artifact
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: _site

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      security-events: write
      actions: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0  # needed to inspect git tags for app-vs-other bump logic

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: docker/Dockerfile

      - name: Compute build version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "Using tagged version: ${VERSION}"
          else
            curl -sf \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/users/e2jk/packages/container/openhangar/versions?per_page=100" \
              -o /tmp/ghcr-versions.json

            # Determine bump type: minor if any commit since the last release tag
            # touched app/, patch if every commit only touched non-app files.
            # git log (not git diff) is used so that an intermediate change that
            # was later reverted still triggers a minor bump.
            LAST_TAG=$(git tag --list 'v[0-9]*' --sort=-version:refname | head -1)
            if [ -n "$LAST_TAG" ] && [ -z "$(git log "${LAST_TAG}..HEAD" --oneline -- app/)" ]; then
              BUMP=patch
            else
              BUMP=minor
            fi
            echo "Last release tag: ${LAST_TAG:-<none>}, bump type: ${BUMP}"

            VERSION=$(python3 .github/scripts/next_semver.py --bump "${BUMP}" < /tmp/ghcr-versions.json)
            echo "Computed build version: ${VERSION}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Embed version into admin UI template
        run: |
          sed -i "s/Development version/version ${VERSION}/" \
            app/templates/config/settings.html

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build Docker image (linux/amd64, for testing)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg VERSION="${VERSION}" \
            -f docker/Dockerfile \
            -t openhangar:ci \
            --load .

      - name: Test database migrations
        run: |
          docker network create migtest-net
          docker run -d --name migtest-db --network migtest-net \
            -e POSTGRES_DB=openhangar \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            postgres:18-alpine
          until docker exec migtest-db pg_isready -U postgres 2>/dev/null; do sleep 1; done

          docker run --rm --network migtest-net \
            --entrypoint python \
            -e DATABASE_URL="postgresql://postgres:postgres@migtest-db:5432/openhangar" \
            -e FLASK_ENV=production \
            -e SECRET_KEY=migtest-ci-not-for-production-use-only \
            openhangar:ci docker-init-db.py

          docker run --rm --network migtest-net \
            --entrypoint flask \
            -e DATABASE_URL="postgresql://postgres:postgres@migtest-db:5432/openhangar" \
            -e FLASK_ENV=production \
            -e SECRET_KEY=migtest-ci-not-for-production-use-only \
            -e FLASK_APP=init:create_app \
            openhangar:ci db check

          docker rm -f migtest-db
          docker network rm migtest-net

      - name: Smoke-test backup (pg_dump end-to-end)
        run: |
          docker network create backup-test-net
          docker run -d --name backup-test-db --network backup-test-net \
            -e POSTGRES_DB=openhangar \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            postgres:18-alpine
          until docker exec backup-test-db pg_isready -U postgres 2>/dev/null; do sleep 1; done

          docker run --rm --network backup-test-net \
            --entrypoint python \
            -e DATABASE_URL="postgresql://postgres:postgres@backup-test-db:5432/openhangar" \
            -e FLASK_ENV=production \
            -e SECRET_KEY=backuptest-ci-not-for-production-use-only \
            openhangar:ci docker-init-db.py

          output=$(docker run --rm --network backup-test-net \
            --entrypoint flask \
            -e DATABASE_URL="postgresql://postgres:postgres@backup-test-db:5432/openhangar" \
            -e FLASK_ENV=production \
            -e SECRET_KEY=backuptest-ci-not-for-production-use-only \
            -e BACKUP_ENCRYPTION_KEY=ci-test-key \
            -e FLASK_APP=init:create_app \
            -e BACKUP_FOLDER=/tmp/backups \
            openhangar:ci backup-now)
          echo "$output"
          if ! echo "$output" | grep -q "Backup OK:"; then
            echo "::error::Backup smoke test failed — expected 'Backup OK:' in output"
            exit 1
          fi
          echo "Backup smoke test passed."

          docker rm -f backup-test-db
          docker network rm backup-test-net

      - name: Smoke-test Docker image (demo mode)
        env:
          SMOKE_DB: smoke-db
          SMOKE_DB_NAME: smokedb
          SMOKE_DB_USER: smokeuser
          SMOKE_DB_PASS: smokepass
          SMOKE_WEB: smoke-web
        run: |
          docker network create smoke-net
          docker run -d --name "$SMOKE_DB" --network smoke-net \
            -e POSTGRES_DB="$SMOKE_DB_NAME" \
            -e POSTGRES_USER="$SMOKE_DB_USER" \
            -e POSTGRES_PASSWORD="$SMOKE_DB_PASS" \
            postgres:18-alpine

          docker run -d --name "$SMOKE_WEB" --network smoke-net \
            -p 5001:5000 \
            -e DATABASE_URL="postgresql://$SMOKE_DB_USER:$SMOKE_DB_PASS@$SMOKE_DB:5432/$SMOKE_DB_NAME" \
            -e DB_HOST="$SMOKE_DB" \
            -e FLASK_ENV=demo \
            -e SECRET_KEY=smoke-ci-secret-not-for-production-use-only \
            openhangar:ci

          echo "Waiting up to 120 s for $SMOKE_WEB to become healthy..."
          start=$SECONDS
          deadline=$((start + 120))
          while [ $SECONDS -lt $deadline ]; do
            status=$(docker inspect --format='{{.State.Health.Status}}' "$SMOKE_WEB")
            echo "  [t+$((SECONDS - start))s] health=${status}"
            [ "$status" = "healthy" ] && break
            [ "$status" = "unhealthy" ] && break
            sleep 1
          done

          final=$(docker inspect --format='{{.State.Health.Status}}' "$SMOKE_WEB")
          if [ "$final" != "healthy" ]; then
            echo "::error::$SMOKE_WEB did not become healthy within 120 s (final status: ${final})"
            echo "=== $SMOKE_WEB logs ==="
            docker logs "$SMOKE_WEB"
            exit 1
          fi
          echo "Smoke test passed — container is healthy."

      - name: OWASP ZAP baseline scan
        # Scans the smoke container (still running on localhost:5001) for OWASP
        # regressions: CSP, security headers, CSRF, open redirects, etc.
        # Suppressions for known false positives are in .zap/rules.tsv.
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:5001'
          rules_file_name: '.zap/rules.tsv'
          fail_action: 'true'
          allow_issue_writing: 'false'
          artifact_name: zap-baseline-results

      - name: Convert ZAP JSON report to SARIF
        if: always() && hashFiles('report_json.json') != ''
        run: python3 .github/scripts/zap_to_sarif.py report_json.json zap-results.sarif .zap/rules.tsv

      - name: Upload ZAP SARIF to GitHub Security tab
        if: always() && hashFiles('zap-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: zap-results.sarif
          category: zap

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: openhangar:ci
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: 'true'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Check for newly introduced vulnerabilities
        run: |
          trivy image --format json --severity HIGH,CRITICAL --ignore-unfixed \
            --quiet openhangar:ci > /tmp/trivy-new.json

          if docker pull ghcr.io/e2jk/openhangar:latest 2>/dev/null; then
            HAS_BASELINE=true
            trivy image --format json --severity HIGH,CRITICAL --ignore-unfixed \
              --quiet ghcr.io/e2jk/openhangar:latest > /tmp/trivy-baseline.json
          else
            HAS_BASELINE=false
          fi

          export HAS_BASELINE
          python3 .github/scripts/trivy_diff.py

      - name: Generate SBOM (CycloneDX)
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: openhangar:ci
          format: cyclonedx-json
          artifact-name: sbom-${{ github.sha }}.cyclonedx.json
          upload-artifact: true
          dependency-snapshot: true

      - name: Log in to GitHub Container Registry
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for arm64 cross-build)
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Build and push multi-platform image (linux/amd64 + linux/arm64)
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg VERSION="${VERSION}" \
            -f docker/Dockerfile \
            -t ghcr.io/e2jk/openhangar:sha-${{ github.sha }} \
            --push .

      - name: Save version metadata
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
        run: |
          echo "VERSION=${VERSION}" > version.txt
          echo "GIT_SHA=${{ github.sha }}" >> version.txt

      - name: Upload version artifact
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: version
          path: version.txt
          retention-days: 1

  e2e:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Set up venv
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet --require-hashes -r requirements/ci.txt

      - name: Fetch vendor frontend assets
        # Vendor files (Bootstrap, Leaflet, etc.) are not committed to git.
        # The E2E server serves them statically; without them Bootstrap's CSS
        # is missing and d-none has no effect, breaking visibility assertions.
        run: .venv/bin/python scripts/fetch_vendor_assets.py

      - name: Install Playwright Chromium browser and OS dependencies
        # The Chromium revision is pinned by the playwright package version in ci.txt.
        # --with-deps installs required system libraries on Ubuntu.
        run: .venv/bin/playwright install chromium --with-deps

      - name: Generate E2E route inventory
        # generate_routes.py needs a seeded database to resolve parametrised URLs.
        # We spin up a temporary SQLite DB, run the dev seed, then generate the JSON.
        # routes.json is intentionally not committed to git; it is always regenerated
        # from the current URL map so the crawl stays in sync with code changes.
        env:
          FLASK_ENV: development
          SECRET_KEY: ci-temp-key-not-for-production-use-only
          DATABASE_URL: sqlite:////tmp/ci_routes.db
        run: |
          .venv/bin/python - <<'EOF'
          import sys, tempfile
          sys.path.insert(0, 'app')
          from init import create_app
          from models import db
          from dev_seed import seed
          app = create_app()
          app.config['UPLOAD_FOLDER'] = tempfile.mkdtemp()
          with app.app_context():
              db.create_all()
              seed()
          EOF
          .venv/bin/python scripts/generate_routes.py \
              --db-url sqlite:////tmp/ci_routes.db

      - name: Run E2E tests
        run: bash scripts/run-tests-with-coverage.sh --e2e

  publish:
    needs: [tests, docker-build, e2e]
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      packages: write
      pages: write
      id-token: write
      security-events: write
      attestations: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download version artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: version

      - name: Read version
        run: |
          VERSION=$(grep '^VERSION=' version.txt | cut -d= -f2)
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Publishing version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag and push semver, latest, and short-SHA (multi-platform)
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker buildx imagetools create \
            --tag ghcr.io/e2jk/openhangar:${VERSION} \
            --tag ghcr.io/e2jk/openhangar:latest \
            --tag ghcr.io/e2jk/openhangar:sha-${SHORT_SHA} \
            ghcr.io/e2jk/openhangar:sha-${{ github.sha }}

      - name: Get image digest
        id: image-digest
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            ghcr.io/e2jk/openhangar:${VERSION} \
            --format '{{.Manifest.Digest}}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest Docker image provenance (GitHub attestations)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ghcr.io/e2jk/openhangar
          subject-digest: ${{ steps.image-digest.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign Docker image with cosign (keyless)
        run: |
          cosign sign --yes \
            ghcr.io/e2jk/openhangar@${{ steps.image-digest.outputs.digest }}

      - name: Download SBOM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom-${{ github.sha }}.cyclonedx.json

      - name: Sign SBOM with cosign (Sigstore bundle for OpenSSF Scorecard)
        run: |
          cosign sign-blob --yes \
            --bundle "sbom-${{ github.sha }}.cyclonedx.json.sigstore.json" \
            "sbom-${{ github.sha }}.cyclonedx.json"

      - name: Attest SBOM provenance (SLSA)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: sbom-${{ github.sha }}.cyclonedx.json

      - name: Download SBOM provenance bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # gh attestation download writes a file named after the artifact digest.
          # Snapshot existing .jsonl files, run the download, then find the new one.
          ls -1 ./*.jsonl 2>/dev/null | sort > /tmp/before.txt || true
          gh attestation download "sbom-${{ github.sha }}.cyclonedx.json" \
            --repo "${{ github.repository }}"
          ls -1 ./*.jsonl 2>/dev/null | sort > /tmp/after.txt || true
          BUNDLE=$(comm -13 /tmp/before.txt /tmp/after.txt | head -1)
          mv "$BUNDLE" "sbom-${{ github.sha }}.cyclonedx.json.intoto.jsonl"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/releases/generate-notes \
            --method POST \
            --field tag_name="v${VERSION}" \
            --field target_commitish="${{ github.sha }}" \
            --jq '.body' > /tmp/auto-notes.md
          {
            printf '## Docker Image\n\n```\ndocker pull ghcr.io/e2jk/openhangar:%s\n```\n\n' "${VERSION}"
            cat /tmp/auto-notes.md
          } > /tmp/release-notes.md
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            "sbom-${{ github.sha }}.cyclonedx.json#SBOM (CycloneDX JSON)" \
            "sbom-${{ github.sha }}.cyclonedx.json.sigstore.json#SBOM signature (Sigstore)" \
            "sbom-${{ github.sha }}.cyclonedx.json.intoto.jsonl#SBOM provenance (SLSA)"

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
