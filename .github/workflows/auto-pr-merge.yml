name: Auto-PR and auto-merge

# Push to `ship` to land it on main without opening a PR by hand. This
# workflow does no CI work of its own — it only opens (or reuses) a PR to
# main and enables GitHub's native auto-merge. The pull_request event that
# opening the PR generates is what triggers ci.yml's real work: computing
# the real version, building, running the full test suite against that
# exact image, and publishing immediately on success (see ci.yml's version
# job). Once the required checks recorded against the PR's head SHA pass,
# auto-merge lands it on main on its own — main only ever receives content
# that's already been fully tested and already published.
on:
  push:
    branches: [ship]

permissions: read-all  # zizmor: ignore[excessive-permissions] intentional: workflow default is read-only, the job below opts into exactly the write scopes it needs

concurrency:
  group: auto-pr-merge
  cancel-in-progress: false

jobs:
  auto-pr:
    name: Open PR to main and enable auto-merge
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write       # gh pr merge
      pull-requests: write  # gh pr create / gh pr merge
    steps:
      - name: Open PR (if none exists) and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          pr_number=$(gh pr list --head ship --base main --state open --json number --jq '.[0].number // empty')
          if [ -z "$pr_number" ]; then
            title=$(gh api "repos/$GH_REPO/commits/$HEAD_SHA" --jq '.commit.message' | head -1)
            gh pr create --base main --head ship --title "${title:-ship}" \
              --body "Auto-opened from \`ship\` — will merge once CI passes."
            pr_number=$(gh pr list --head ship --base main --state open --json number --jq '.[0].number')
          fi
          echo "PR #$pr_number"
          gh pr merge "$pr_number" --auto --rebase
