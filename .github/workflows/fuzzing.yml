name: Fuzzing

# Deliberately independent of ci.yml: no `needs:`/status-check relationship,
# not configured as a required check in branch protection, and triggered by
# push to main (i.e. after a PR merges) rather than on the PR itself — so it
# cannot block a PR merge or a release even mechanically. A crash here surfaces
# three ways — the job summary (crash traceback inline), the Security tab
# (SARIF, deduped by rule+location like CodeQL/bandit/pip-audit already are
# in this repo), and a downloadable repro artifact — but every finding needs
# human triage before it's known to be a real, reachable bug; see
# docs/development.md's "Fuzzing" section for the full reasoning.

on:
  push:
    branches: [main] # runs after a PR merges, not on every PR push — matches
    # the pattern most other workflows here use (codeql.yml, scorecard.yml)
  schedule:
    - cron: '0 4 * * 3' # weekly, Wednesday 04:00 UTC — deeper batch run
  workflow_dispatch:

permissions: read-all  # zizmor: ignore[excessive-permissions] intentional: workflow default is read-only, the job below opts into exactly the write scopes it needs

concurrency:
  group: ${{ format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: Fuzz (${{ matrix.harness }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write # crash SARIF upload to the Security tab
    strategy:
      fail-fast: false
      matrix:
        harness:
          - fuzz_safe_next
          - fuzz_safe_join
          - fuzz_safe_path_component
          - fuzz_logbook_parse_file
          - fuzz_logbook_value_parsers
          - fuzz_gps_import
          - fuzz_flight_form_parsing
          - fuzz_pilot_form_parsing
          - fuzz_maintenance_form_parsing
          - fuzz_backup_format
          - fuzz_offline_sync_validators
    env:
      # Routed through a shell env var rather than interpolated directly into
      # run: blocks (${{ matrix.harness }} inline in a script is a template-
      # injection footgun zizmor's pedantic persona flags — these values are
      # hardcoded in the matrix above, not attacker-controlled, but there's
      # no reason not to use the safe pattern anyway).
      HARNESS: ${{ matrix.harness }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: |
            requirements/runtime.txt
            requirements/fuzz.txt

      - name: Set up venv
        # Two separate --require-hashes installs, not one combined command —
        # combining requirements files in a single `pip install -r a -r b`
        # breaks --require-hashes (see AGENTS.md's Quick start section).
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet --require-hashes -r requirements/runtime.txt
          .venv/bin/pip install --quiet --require-hashes -r requirements/fuzz.txt

      - name: Create corpus directory
        run: mkdir -p "fuzz/corpus/${HARNESS}"

      - name: Restore fuzz corpus
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: fuzz/corpus/${{ matrix.harness }}
          key: fuzz-corpus-${{ matrix.harness }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.harness }}-

      - name: Run fuzzer
        # ~120s per harness after each merge to main (all matrix legs run in
        # parallel, so wall time doesn't grow as more harnesses are added
        # later); a much deeper ~20 min budget on the weekly scheduled batch run.
        run: |
          seconds=120
          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            seconds=1200
          fi
          .venv/bin/python "fuzz/${HARNESS}.py" \
            "fuzz/corpus/${HARNESS}" \
            "-max_total_time=${seconds}"

      - name: Save fuzz corpus
        # Always save, even if the fuzz run above failed (found a crash) —
        # the corpus growth from this run is still worth keeping.
        if: always()
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: fuzz/corpus/${{ matrix.harness }}
          key: fuzz-corpus-${{ matrix.harness }}-${{ github.run_id }}

      - name: Reproduce crash deterministically
        # A single, non-fuzzing re-run against the crash file Atheris just
        # wrote, to capture a clean traceback for the summary/SARIF steps
        # below (the fuzzing run's own log is noisy and non-deterministic).
        if: failure()
        run: |
          crash_file=$(find . -maxdepth 1 -name 'crash-*' -print -quit)
          if [ -n "$crash_file" ]; then
            .venv/bin/python "fuzz/${HARNESS}.py" "$crash_file" > crash-repro.log 2>&1 || true
          fi

      - name: Write job summary
        if: failure() && hashFiles('crash-repro.log') != ''
        run: |
          {
            echo "### 🐛 Fuzz crash: \`${HARNESS}\`"
            echo
            echo '```'
            cat crash-repro.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build crash SARIF
        if: failure() && hashFiles('crash-repro.log') != ''
        run: |
          .venv/bin/python .github/scripts/fuzz_crash_to_sarif.py \
            "$HARNESS" crash-repro.log crash.sarif

      - name: Upload crash results to GitHub Security tab
        if: failure() && hashFiles('crash.sarif') != ''
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          sarif_file: crash.sarif
          category: fuzz-${{ matrix.harness }}

      - name: Upload crash reproducer
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.harness }}-crash
          path: crash-*
          if-no-files-found: ignore
