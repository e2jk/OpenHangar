name: Publish Docker image

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/e2jk/openhangar
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Notify demo server
        continue-on-error: true
        env:
          DEMO_SITE_URL: ${{ secrets.DEMO_SITE_URL }}
          DEMO_WEBHOOK_SECRET: ${{ secrets.DEMO_WEBHOOK_SECRET }}
        run: |
          if [ -z "${DEMO_SITE_URL}" ] || [ -z "${DEMO_WEBHOOK_SECRET}" ]; then
            echo "DEMO_SITE_URL or DEMO_WEBHOOK_SECRET not set — skipping demo notification."
            exit 0
          fi
          curl --silent --max-time 10 \
            -X POST "${DEMO_SITE_URL}demo/webhook" \
            -H "Authorization: Bearer ${DEMO_WEBHOOK_SECRET}" \
          && echo "Demo server notified." \
          || echo "Demo server notification failed (non-fatal)."
