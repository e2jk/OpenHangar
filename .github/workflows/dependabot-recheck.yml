name: Dependabot pending-age recheck

# Runs daily and auto-merges Dependabot PRs that were held open because their
# version was too recent at the time the PR was created.  Once the version has
# matured past the 14-day threshold the PR is auto-merged regardless of semver
# level (patch, minor, or major).

on:
  schedule:
    - cron: '0 9 * * *'   # daily at 09:00 UTC
  workflow_dispatch: {}    # allow manual runs for testing

permissions: read-all  # zizmor: ignore[excessive-permissions] intentional: workflow default is read-only, the job below opts into exactly the write scopes it needs

concurrency:
  group: dependabot-recheck
  cancel-in-progress: true

jobs:
  recheck:
    name: Merge or unlock matured pending Dependabot PRs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write       # gh pr merge
      pull-requests: write  # gh pr merge / gh pr edit
    steps:
      - name: Merge or unlock matured pending Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Collect open Dependabot PRs that carry the pending-minimum-age label.
          PENDING=$(gh pr list \
            --repo "$REPO" \
            --author "app/dependabot" \
            --label "pending-minimum-age" \
            --state open \
            --json number,url,title,headRefName \
            --jq '.[]')

          if [ -z "$PENDING" ]; then
            echo "No pending PRs found."
            exit 0
          fi

          echo "$PENDING" | jq -c '.' | while IFS= read -r pr_json; do
            PR_NUMBER=$(echo "$pr_json" | jq -r '.number')
            PR_URL=$(echo "$pr_json"    | jq -r '.url')
            TITLE=$(echo "$pr_json"     | jq -r '.title')
            HEAD_REF=$(echo "$pr_json"  | jq -r '.headRefName')
            echo ""
            echo "── PR #${PR_NUMBER} (${PR_URL}) ──"

            # The maturity decision is NEVER based on PR comments — any account
            # can post a comment on a public repo, so a comment claiming a
            # backdated "ready" date cannot be trusted as the merge authority.
            # Instead, recompute the release age from the source of truth,
            # reusing the same logic as the "Check version age" step in
            # dependabot-automerge.yml: parse the ecosystem, dependency name, and new
            # version straight from the PR itself (branch name — format
            # "dependabot/<ecosystem>/<dep>-<version>" — and the PR title,
            # "Bump <dep> from <old> to <new>").
            ECOSYSTEM=$(echo "$HEAD_REF" | awk -F/ '{print $2}')

            if [[ "$TITLE" =~ ^Bump\ ([^[:space:]]+)\ from\ ([^[:space:]]+)\ to\ ([^[:space:]]+) ]]; then
              FIRST_DEP="${BASH_REMATCH[1]}"
              NEW_VERSION="${BASH_REMATCH[3]}"
            else
              echo "  Could not parse dependency/version from PR title '${TITLE}' — leaving held (fail safe)."
              continue
            fi
            echo "  Ecosystem: ${ECOSYSTEM}  Dependency: ${FIRST_DEP}  New version: ${NEW_VERSION}"

            RELEASE_DATE=""
            if [ "$ECOSYSTEM" = "pip" ]; then
              # Earliest upload_time across all distribution files for this version.
              RELEASE_DATE=$(curl -sf \
                "https://pypi.org/pypi/${FIRST_DEP}/${NEW_VERSION}/json" \
                | jq -r '[.urls[].upload_time] | min // empty' 2>/dev/null || echo "")

            elif [ "$ECOSYSTEM" = "github-actions" ]; then
              # Actions are SHA-pinned; check the commit date of the new SHA.
              RELEASE_DATE=$(gh api \
                "repos/${FIRST_DEP}/commits/${NEW_VERSION}" \
                --jq '.commit.committer.date' 2>/dev/null || echo "")

            else
              echo "  Unrecognised ecosystem '${ECOSYSTEM}' — leaving held (fail safe)."
              continue
            fi

            if [ -z "$RELEASE_DATE" ]; then
              echo "  Could not determine release date — leaving held (fail safe)."
              continue
            fi

            RELEASE_EPOCH=$(date -d "$RELEASE_DATE" +%s)
            NOW_EPOCH=$(date +%s)
            AGE_DAYS=$(( (NOW_EPOCH - RELEASE_EPOCH) / 86400 ))
            echo "  Recomputed release date: ${RELEASE_DATE} (${AGE_DAYS} day(s) ago)"

            if [ "$AGE_DAYS" -lt 14 ]; then
              echo "  Not yet matured — skipping."
              continue
            fi

            echo "  Version has matured. Removing label and enabling auto-merge..."
            gh pr edit "$PR_NUMBER" --repo "$REPO" \
              --remove-label "pending-minimum-age"
            gh pr merge --auto --merge "$PR_URL"
            echo "  PR #${PR_NUMBER} scheduled for auto-merge."
          done
