name: Dependabot auto-merge

on: pull_request

permissions: read-all  # zizmor: ignore[excessive-permissions] intentional: workflow default is read-only, the job below opts into exactly the write scopes it needs

concurrency:
  group: dependabot-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  automerge:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    permissions:
      contents: write       # gh pr merge
      pull-requests: write  # gh pr merge / gh pr edit / gh pr comment
    # Use the PR author, not the run actor: on a `pull_request` event the actor is
    # whoever most recently pushed to the branch, which for a same-repo Dependabot
    # branch is always Dependabot itself, but the author field is the more direct,
    # non-ambiguous signal recommended for bot-identity checks.
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Security updates bypass the age check — merge them immediately regardless
      # of how recently the version was published.
      - name: Auto-merge security updates (any semver level)
        if: steps.meta.outputs.ghsa-id != ''
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # For all non-security updates, check how old the new version is.
      # If it was published less than 14 days ago we hold the PR open with a
      # label; a scheduled workflow (dependabot-recheck.yml) merges it once the
      # version has matured.  Closing the PR would cause Dependabot to dismiss
      # that version permanently, so we intentionally never close these.
      # This guards against supply-chain attacks that slip in malicious code
      # before the community has had time to detect it.
      - name: Check version age
        id: age
        if: steps.meta.outputs.ghsa-id == ''
        env:
          ECOSYSTEM: ${{ steps.meta.outputs.package-ecosystem }}
          DEP_NAMES: ${{ steps.meta.outputs.dependency-names }}
          NEW_VERSION: ${{ steps.meta.outputs.new-version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # dependency-names is a JSON array string; extract the first entry.
          FIRST_DEP=$(echo "$DEP_NAMES" | jq -r '.[0]' 2>/dev/null \
            || echo "$DEP_NAMES" | tr ',' '\n' | head -1 | xargs)

          if [ "$ECOSYSTEM" = "pip" ]; then
            # Earliest upload_time across all distribution files for this version.
            RELEASE_DATE=$(curl -sf \
              "https://pypi.org/pypi/${FIRST_DEP}/${NEW_VERSION}/json" \
              | jq -r '[.urls[].upload_time] | min // empty')

          elif [ "$ECOSYSTEM" = "github-actions" ]; then
            # Actions are SHA-pinned; check the commit date of the new SHA.
            RELEASE_DATE=$(gh api \
              "repos/${FIRST_DEP}/commits/${NEW_VERSION}" \
              --jq '.commit.committer.date' 2>/dev/null || echo "")

          else
            echo "Unrecognised ecosystem '${ECOSYSTEM}'; skipping age check."
            echo "too_recent=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$RELEASE_DATE" ]; then
            echo "Could not determine release date; skipping age check."
            echo "too_recent=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RELEASE_EPOCH=$(date -d "$RELEASE_DATE" +%s)
          NOW_EPOCH=$(date +%s)
          AGE_DAYS=$(( (NOW_EPOCH - RELEASE_EPOCH) / 86400 ))
          echo "Release date: ${RELEASE_DATE} (${AGE_DAYS} day(s) ago)"
          echo "age_days=${AGE_DAYS}" >> "$GITHUB_OUTPUT"

          if [ "$AGE_DAYS" -lt 14 ]; then
            echo "too_recent=true" >> "$GITHUB_OUTPUT"
          else
            echo "too_recent=false" >> "$GITHUB_OUTPUT"
          fi

      # Instead of closing (which causes Dependabot to permanently dismiss the
      # version), label the PR and leave it open.  A scheduled workflow
      # (dependabot-recheck.yml) will auto-merge it once the version matures.
      # We skip the comment if the label is already present to avoid duplicates
      # when Dependabot rebases the branch while we're still waiting.
      - name: Hold PR — version too recent
        if: steps.age.outputs.too_recent == 'true'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AGE_DAYS: ${{ steps.age.outputs.age_days }}
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Create the label if it doesn't exist yet (idempotent).
          gh label create "pending-minimum-age" \
            --color "E4E669" \
            --description "Held until version meets the 14-day minimum age requirement" \
            2>/dev/null || true

          # Skip if already labelled (rebase event on an already-held PR).
          if gh pr view "$PR_NUMBER" --json labels \
              --jq '.labels[].name' | grep -qx "pending-minimum-age"; then
            echo "PR already labelled — skipping duplicate comment."
            exit 0
          fi

          DAYS_LEFT=$(( 14 - AGE_DAYS ))
          READY_DATE=$(date -d "+${DAYS_LEFT} days" +%Y-%m-%d)

          gh pr edit "$PR_NUMBER" --add-label "pending-minimum-age"
          gh pr comment "$PR_NUMBER" --body \
            "⏳ **Version too recent (${AGE_DAYS} day(s) old — minimum: 14 days).**

          This PR will be auto-merged on or after **${READY_DATE}** once the version meets the minimum age requirement. A scheduled workflow checks daily and will merge it automatically — no action needed.

          Security updates are exempt from this delay and are merged immediately.

          <!-- pending-min-age: ready=${READY_DATE} update-type=${UPDATE_TYPE} -->"

      - name: Auto-merge matured non-security updates
        if: steps.age.outputs.too_recent != 'true'
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
