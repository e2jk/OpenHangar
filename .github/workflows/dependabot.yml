name: Dependabot auto-merge

on: pull_request

permissions: read-all

jobs:
  automerge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Security updates bypass the age check — merge them immediately regardless
      # of how recently the version was published.
      - name: Auto-merge security updates (any semver level)
        if: steps.meta.outputs.ghsa-id != ''
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # For all non-security updates, check how old the new version is.
      # If it was published less than 14 days ago we close the PR immediately;
      # Dependabot will recreate it on the next weekly run, and once the version
      # is old enough the PR will be kept open and auto-merged below.
      # This guards against supply-chain attacks that slip in malicious code
      # before the community has had time to detect it.
      - name: Check version age
        id: age
        if: steps.meta.outputs.ghsa-id == ''
        env:
          ECOSYSTEM: ${{ steps.meta.outputs.package-ecosystem }}
          DEP_NAMES: ${{ steps.meta.outputs.dependency-names }}
          NEW_VERSION: ${{ steps.meta.outputs.new-version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # dependency-names is a JSON array string; extract the first entry.
          FIRST_DEP=$(echo "$DEP_NAMES" | jq -r '.[0]' 2>/dev/null \
            || echo "$DEP_NAMES" | tr ',' '\n' | head -1 | xargs)

          if [ "$ECOSYSTEM" = "pip" ]; then
            # Earliest upload_time across all distribution files for this version.
            RELEASE_DATE=$(curl -sf \
              "https://pypi.org/pypi/${FIRST_DEP}/${NEW_VERSION}/json" \
              | jq -r '[.urls[].upload_time] | min // empty')

          elif [ "$ECOSYSTEM" = "github-actions" ]; then
            # Actions are SHA-pinned; check the commit date of the new SHA.
            RELEASE_DATE=$(gh api \
              "repos/${FIRST_DEP}/commits/${NEW_VERSION}" \
              --jq '.commit.committer.date' 2>/dev/null || echo "")

          else
            echo "Unrecognised ecosystem '${ECOSYSTEM}'; skipping age check."
            echo "too_recent=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$RELEASE_DATE" ]; then
            echo "Could not determine release date; skipping age check."
            echo "too_recent=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RELEASE_EPOCH=$(date -d "$RELEASE_DATE" +%s)
          NOW_EPOCH=$(date +%s)
          AGE_DAYS=$(( (NOW_EPOCH - RELEASE_EPOCH) / 86400 ))
          echo "Release date: ${RELEASE_DATE} (${AGE_DAYS} day(s) ago)"
          echo "age_days=${AGE_DAYS}" >> "$GITHUB_OUTPUT"

          if [ "$AGE_DAYS" -lt 14 ]; then
            echo "too_recent=true" >> "$GITHUB_OUTPUT"
          else
            echo "too_recent=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Close PR — version too recent
        if: steps.age.outputs.too_recent == 'true'
        run: |
          gh pr close "$PR_URL" --comment \
            "⏳ **Version too recent (${{ steps.age.outputs.age_days }} day(s) old — minimum: 14 days).**

            Closing to avoid potential supply-chain attacks; Dependabot will recreate this PR once the version meets the minimum age requirement.

            Security updates are exempt from this delay and are merged immediately."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' &&
          steps.age.outputs.too_recent != 'true'
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
