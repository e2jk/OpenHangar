name: CodeQL

on:
  push:
    branches: [main, ship]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 9 * * 1'  # Monday 09:23 UTC

permissions: read-all  # zizmor: ignore[excessive-permissions] intentional: workflow default is read-only, the job below opts into exactly the write scopes it needs

concurrency:
  group: codeql-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Runs on push to ship (parallel with ci.yml's own ~10 minute run, so
    # results are ready by the time the PR opens instead of only starting
    # then) rather than waiting for the pull_request event that opening
    # that PR causes — which, with auto-pr-merge.yml now only opening the
    # PR after CI already passed, would otherwise add CodeQL's own runtime
    # sequentially on top instead of running for free in parallel. Skipped
    # for that redundant pull_request run (same commit already scanned via
    # the push above).
    if: |
      !(github.event_name == 'pull_request' && github.head_ref == 'ship')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read           # required by codeql-action to auto-detect languages/workflow context
      contents: read          # checkout
      security-events: write  # upload SARIF results to the Security tab
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript, actions]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          config-file: .github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          category: "/language:${{ matrix.language }}"
