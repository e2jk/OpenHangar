name: Dependabot auto-merge

on: pull_request

permissions: read-all  # zizmor: ignore[excessive-permissions] intentional: workflow default is read-only, the job below opts into exactly the write scopes it needs

concurrency:
  group: dependabot-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  automerge:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write       # gh pr merge
      pull-requests: write  # gh pr merge / gh pr edit / gh pr comment
    # Use the PR author, not the run actor: on a `pull_request` event the actor is
    # whoever most recently pushed to the branch, which for a same-repo Dependabot
    # branch is always Dependabot itself, but the author field is the more direct,
    # non-ambiguous signal recommended for bot-identity checks.
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      # No age check needed here: security updates are exempt from cooldown by
      # design (see dependabot.yml), and non-security updates never reach this
      # workflow at all until Dependabot's own cooldown: config (14 days) has
      # already been satisfied — the PR simply doesn't exist before then.
      #
      # Nothing needs to run after the merge lands: ci.yml's publish_now path
      # already ran the full pipeline (version, build, test, publish) against
      # this PR before auto-merge could even complete, since publish_now
      # requires the head branch to be a dependabot/* branch (see ci.yml's
      # version job) — landing on main is a no-op.
      - name: Auto-merge Dependabot PR
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --rebase "$PR_URL"
