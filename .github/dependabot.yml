version: 2
updates:
  # Keep GitHub Actions SHA-pinned versions current
  - package-ecosystem: github-actions  # zizmor: ignore[dependabot-cooldown] custom 14-day maturity gate already enforced in workflows/dependabot.yml + dependabot-recheck.yml (recomputes release age from source of truth); migrating to native cooldown: is a worthwhile but separate follow-up
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      # init/analyze/upload-sarif must stay on the exact same codeql-action
      # release — analyze reads state init wrote, and a version mismatch
      # between them fails the job outright ("Loaded a configuration file
      # for version 'X', but running version 'Y'"). Bump them atomically.
      codeql-action:
        patterns:
          - "github/codeql-action/*"

