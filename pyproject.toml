[tool.ruff]
target-version = "py311"
exclude = ["app/migrations"]

[tool.ruff.lint]
extend-select = [
    "SIM105",  # Use contextlib.suppress() instead of try-except-pass
    "S110",    # try-except-pass: silently swallows exceptions
]

[tool.ruff.lint.per-file-ignores]
# conftest files set os.environ before importing app code — E402 is intentional
"tests/conftest.py" = ["E402"]
"tests/e2e/conftest.py" = ["E402"]

[tool.bandit]
exclude_dirs = ["app/tests"]

[tool.mypy]
python_version = "3.11"
mypy_path = "app"
explicit_package_bases = true
ignore_missing_imports = true
strict = true

# Flask-SQLAlchemy dynamic ORM base (db.Model) and SQLAlchemy relationship
# attributes are not resolvable without Mapped[] annotations — suppress until
# models are migrated to the typed declarative style.
[[tool.mypy.overrides]]
module = ["models", "_seed_helpers", "reservations.routes"]
ignore_errors = true

[[tool.mypy.overrides]]
module = ["migrations.*"]
ignore_errors = true
