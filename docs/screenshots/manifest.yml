# OpenHangar documentation screenshot manifest
#
# Run:  python scripts/take_screenshots.py
#
# The dev server must be running with seed data loaded:
#   FLASK_ENV=development python app/init.py
#
# To add a new screenshot:
#   1. Add an entry below
#   2. Add the image reference to the relevant docs/*.md file:
#        ![Description](screenshots/your-file.png)
#   3. Run the script

base_url: "http://localhost:5000"

auth:
  admin:
    email: "admin@openhangar.dev"
    password: "openhangar-dev-1"
    totp_secret: "JBSWY3DPEHPK3PXP"

screenshots:

  # ── Unauthenticated ────────────────────────────────────────────────────────

  - id: landing
    description: "Landing page — shown before any users are created"
    url: "/"
    auth: none
    output: "landing.png"

  # ── Authenticated (dev seed admin) ────────────────────────────────────────

  - id: dashboard
    description: "Main dashboard with stat cards and aircraft status overview"
    url: "/"
    auth: admin
    output: "dashboard.png"

  - id: pilot_logbook
    description: "Pilot flight logbook"
    url: "/pilot/logbook"
    auth: admin
    output: "pilot_logbook.png"

  - id: aircraft_list
    description: "Fleet overview with status badges"
    url: "/aircraft/"
    auth: admin
    output: "aircraft_list.png"

  - id: aircraft_detail
    description: "Aircraft detail page (OO-PNH Cessna 172S)"
    url_template: "/aircraft/{aircraft_id}"
    resolve_aircraft: "OO-PNH"
    auth: admin
    output: "aircraft_detail.png"

  - id: aircraft_logbook
    description: "Aircraft (airframe) logbook — flight entries for OO-PNH"
    url_template: "/aircraft/{aircraft_id}/flights"
    resolve_aircraft: "OO-PNH"
    auth: admin
    output: "aircraft_logbook.png"

  - id: aircraft_gps_tracks
    description: "GPS flight tracks map — all recorded tracks for OO-PNH"
    url_template: "/aircraft/{aircraft_id}/tracks"
    resolve_aircraft: "OO-PNH"
    auth: admin
    output: "aircraft_gps_tracks.png"

  - id: wb_calc
    description: "Mass & balance calculation form with envelope (OO-TCH)"
    url_template: "/aircraft/{aircraft_id}/wb/new"
    resolve_aircraft: "OO-TCH"
    auth: admin
    output: "wb_calc.png"

  - id: maintenance
    description: "Maintenance overview — triggers and upcoming tasks"
    url: "/maintenance"
    auth: admin
    output: "maintenance.png"

  - id: config
    description: "Configuration / settings page"
    url: "/config/"
    auth: admin
    output: "config.png"

  # ── Pilot logbook import (Phase 28) ───────────────────────────────────────

  - id: pilot_logbook_import_upload
    description: "Pilot logbook import — file upload step"
    url: "/pilot/logbook/import"
    auth: admin
    output: "pilot_logbook_import_upload.png"

  - id: pilot_logbook_import_history
    description: "Pilot logbook import history — list of past imports with rollback option"
    url: "/pilot/logbook/import/history"
    auth: admin
    output: "pilot_logbook_import_history.png"

  # ── Instance admin / multi-tenant (Phase 29) ──────────────────────────────

  - id: config_tenants
    description: "Tenant management list (instance admin view)"
    url: "/config/tenants"
    auth: admin
    output: "config_tenants.png"

  - id: config_tenants_create
    description: "Create new tenant form (instance admin)"
    url: "/config/tenants/create"
    auth: admin
    output: "config_tenants_create.png"

  # ── Reservations (Phase 22) ────────────────────────────────────────────────

  - id: reservations_calendar
    description: "Per-aircraft booking calendar with colour-coded reservation status (OO-PNH)"
    url_template: "/aircraft/{aircraft_id}/reservations/"
    resolve_aircraft: "OO-PNH"
    auth: admin
    output: "reservations_calendar.png"

  # ── Unified flight form (Phase 31b) ────────────────────────────────────────

  - id: flight_form
    description: "Unified 'Log a flight' form — fills aircraft and pilot logbooks in one step"
    url: "/flights/new"
    auth: admin
    output: "flight_form.png"

  # ── Airworthiness tracker (Phase 33) ───────────────────────────────────────

  - id: airworthiness
    description: "Airworthiness tracker — ADs, SIBs, ARC and installed STCs (OO-GRN Robin DR-401)"
    url_template: "/aircraft/{aircraft_id}/airworthiness/"
    resolve_aircraft: "OO-GRN"
    auth: admin
    output: "airworthiness.png"

  # ── Notification preferences (Phase 34) ────────────────────────────────────

  - id: config_notifications
    description: "Email notification preferences, grouped by category"
    url: "/config/notifications/"
    auth: admin
    output: "config_notifications.png"

  # ── Operating cost dashboard (Phase 36) ────────────────────────────────────

  - id: cost_dashboard
    description: "Aircraft operating cost dashboard — fixed/operating split and wet rate (OO-PNH, all-time period so the seed expenses are in view)"
    url_template: "/aircraft/{aircraft_id}/costs?period=0"
    resolve_aircraft: "OO-PNH"
    auth: admin
    output: "cost_dashboard.png"

  # ── Rental operations (Phase 37) ────────────────────────────────────────────

  - id: renters_list
    description: "Renter authorizations list — active and expired, scoped to the whole fleet or one aircraft"
    url: "/config/renters/"
    auth: admin
    output: "renters_list.png"

  - id: dispatch_checkout
    description: "Check-out (dispatch) form — counters, fuel state, walk-around and open-snags acknowledgement (OO-PNH, upcoming reservation)"
    url_template: "/aircraft/{aircraft_id}/reservations/{reservation_id}/checkout"
    resolve_aircraft: "OO-PNH"
    resolve_reservation_notes: "PPL renewal flight"
    auth: admin
    output: "dispatch_checkout.png"

  - id: renter_account
    description: "Renter account statement — owner view, balance and ledger entries (Rita Renter)"
    url_template: "/config/renters/{renter_user_id}/account"
    resolve_renter_name: "Rita Renter"
    auth: admin
    output: "renter_account.png"

  # ── Pilots: personal minimums ────────────────────────────────────────────────

  - id: personal_minimums
    description: "Personal minimums — active revision, read-only view"
    url: "/pilot/minimums"
    auth: admin
    output: "personal_minimums.png"

  # ── Offline logbook editing (Phase 38) ──────────────────────────────────────

  - id: offline_workbench
    description: "Offline logbook workbench — editable aircraft logbook table, cached for offline use (OO-PNH)"
    url_template: "/aircraft/{aircraft_id}/logbook/offline"
    resolve_aircraft: "OO-PNH"
    auth: admin
    output: "offline_workbench.png"

  - id: offline_changes
    description: "Offline changes — pending edits waiting to sync, with per-field conflict resolution"
    url: "/offline/changes"
    auth: admin
    output: "offline_changes.png"
