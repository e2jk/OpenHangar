"Flight counter end must be greater than flight counter start." = "Le compteur de fin doit être supérieur au compteur de début."
"Engine counter end must be greater than engine counter start." = "Le compteur moteur de fin doit être supérieur au compteur moteur de début."
"Flight time must be a non-negative number." = "Le temps de vol doit être un nombre non négatif."
"Passenger count must be a non-negative integer." = "Le nombre de passagers doit être un entier non négatif."
"Landing count must be a non-negative integer." = "Le nombre d'atterrissages doit être un entier non négatif."
"Fuel quantity added must be a non-negative number." = "La quantité de carburant ajoutée doit être un nombre non négatif."
"Fuel remaining must be a non-negative number." = "Le carburant restant doit être un nombre non négatif."
"Flight %(dep)s→%(arr)s on %(date)s saved." = "Vol %(dep)s→%(arr)s du %(date)s enregistré."
"Flight %(dep)s→%(arr)s on %(date)s saved to your pilot logbook." = "Vol %(dep)s→%(arr)s du %(date)s enregistré dans votre carnet de vol."
"Possible duplicate detected" = "Doublon possible détecté"
"Choose how to proceed, or continue editing below." = "Choisissez comment procéder, ou continuez à modifier ci-dessous."
"Attach GPS track to existing entry" = "Associer la trace GPS à l'entrée existante"
"Upload a GPX, KML, or CSV track to auto-fill date, route and times." = "Importez une trace GPX, KML ou CSV pour remplir automatiquement la date, le trajet et les horaires."
"Not logging in my pilot logbook" = "Ne pas enregistrer dans mon carnet de vol"
"A pilot log entry is linked to this flight. What should happen to it?" = "Une entrée de carnet de vol est liée à ce vol. Que doit-il lui arriver ?"
"Unlink (keep pilot log entry)" = "Dissocier (conserver l'entrée du carnet de vol)"
"PIC name (if not you)" = "Nom du CDB (si ce n'est pas vous)"

