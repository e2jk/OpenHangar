# Phase 31b — Unified Flight Entry translations
# Run: python scripts/add_translations.py scripts/translations/phase31b.toml

[fr]
"GPS file parsed — fields pre-filled. Review and save." = "Fichier GPS traité — champs pré-remplis. Vérifiez et enregistrez."
"Could not parse GPS file. Fill in the fields manually." = "Impossible de lire le fichier GPS. Remplissez les champs manuellement."
"GPS file parsed: %(filename)s — fields pre-filled below. Review and save." = "Fichier GPS %(filename)s traité — champs pré-remplis ci-dessous. Vérifiez et enregistrez."
"GPS track linked" = "Trace GPS liée"
"GPS track linked to the existing flight entry." = "Trace GPS liée à l'entrée de vol existante."
"Could not link GPS track — no matching entry found." = "Impossible de lier la trace GPS — aucune entrée correspondante trouvée."
"Log a flight" = "Enregistrer un vol"
"Date must be a valid date (YYYY-MM-DD)." = "La date doit être valide (AAAA-MM-JJ)."
"Departure airfield is required." = "L'aérodrome de départ est obligatoire."
"Arrival airfield is required." = "L'aérodrome d'arrivée est obligatoire."
"Pilot (crew 1) name is required." = "Le nom du pilote (équipage 1) est obligatoire."
"Pilot role is required for other aircraft flights." = "Le rôle du pilote est obligatoire pour les vols sur autres aéronefs."
"Pilot name is required." = "Le nom du pilote est obligatoire."
"Departure time must be a valid UTC time (HH:MM)." = "L'heure de départ doit être une heure UTC valide (HH:MM)."
"Arrival time must be a valid UTC time (HH:MM)." = "L'heure d'arrivée doit être une heure UTC valide (HH:MM)."
