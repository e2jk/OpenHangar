{% extends "base.html" %}

{% block title %}OpenHangar — Log In{% endblock %}

{% block head %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-card-header">
      <div class="brand-name">
        <i class="bi bi-airplane brand-icon"></i>OpenHangar
      </div>
      <div class="page-title">Sign in to your account</div>
    </div>

    <div class="auth-card-body">
      <form method="POST" action="{{ url_for('auth.login') }}" novalidate>

        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="you@example.com" required autofocus>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" name="password"
                 class="form-control" placeholder="Your password" required>
        </div>

        <div class="mb-4">
          <label for="totp_code" class="form-label">
            Authenticator code
            <span class="text-muted fw-normal" style="font-size:.8rem;">(6 digits)</span>
          </label>
          <input type="text" id="totp_code" name="totp_code"
                 class="form-control totp-code-input"
                 placeholder="000000" maxlength="6" inputmode="numeric"
                 autocomplete="one-time-code" required>
        </div>

        <button type="submit" class="btn btn-auth-primary">
          <i class="bi bi-box-arrow-in-right me-2"></i>Log in
        </button>

      </form>
    </div>

  </div>
</div>
{% endblock %}
