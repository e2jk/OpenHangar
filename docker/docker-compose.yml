networks:
  traefik-network:
  # Internal-only: shared exclusively by traefik and socket-proxy, so nothing
  # else on the host network can reach the proxied Docker socket endpoint.
  socket-proxy-network:
    internal: true

services:
  # Stands between Traefik and the Docker socket so Traefik itself never
  # gets a raw, read-write socket mount — a compromised Traefik (the one
  # container directly exposed to the internet) would otherwise be
  # root-equivalent on the host. Read-only socket mount; allowlists only the
  # handful of GET/HEAD endpoints Traefik's Docker provider actually needs
  # (version, ping, container list/inspect, events) — everything else,
  # including any state-changing method, is refused with 403. Config
  # mirrors the project's own documented Traefik example.
  socket-proxy:
    image: ghcr.io/wollomatic/socket-proxy:1.12.3@sha256:9e781fbe79315355d08901832f639119aa332ac27ee6157fc7f2fab5193c8600
    container_name: socket-proxy
    command:
      - "-loglevel=${SOCKET_PROXY_LOG_LEVEL:-WARN}"
      - "-listenip=0.0.0.0"
      - "-allowfrom=traefik"
      - '-allowGET=/v1\..{1,2}/(version|_ping|containers/.*|events.*)'
      - "-allowHEAD=/_ping"
    # Runs as the image's built-in unprivileged "nobody" user (65534), paired
    # with the host's docker group so it can read (but the mount below is
    # also read-only regardless) the socket. Find your host's docker group
    # ID with: getent group docker | cut -d: -f3
    user: "65534:${SOCKET_PROXY_DOCKER_GID}"
    read_only: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - socket-proxy-network
    restart: unless-stopped

  traefik:
    image: ${TRAEFIK_IMAGE_TAG:-traefik:v3}
    container_name: traefik
    command:
      - "--log.level=${TRAEFIK_LOG_LEVEL:-WARN}"
      - "--accesslog=true"
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--ping=true"
      - "--ping.entrypoint=ping"
      - "--entryPoints.ping.address=:8082"
      - "--entryPoints.web.address=:80"
      - "--entryPoints.web.http.redirections.entryPoint.to=websecure"
      - "--entryPoints.web.http.redirections.entryPoint.scheme=https"
      - "--entryPoints.websecure.address=:443"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--providers.docker.exposedByDefault=false"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme/acme.json"
      - "--global.checkNewVersion=false"
      - "--global.sendAnonymousUsage=false"
    volumes:
      - ./traefik/acme:/etc/traefik/acme
    depends_on:
      - socket-proxy
    networks:
      - traefik-network
      - socket-proxy-network
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "wget", "http://localhost:8082/ping", "--spider"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`${TRAEFIK_HOSTNAME}`)"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.traefik-dashboard.loadbalancer.passhostheader=true"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-dashboard-auth"
      - "traefik.http.middlewares.traefik-dashboard-auth.basicauth.users=${TRAEFIK_BASIC_AUTH}"
    restart: unless-stopped

  openhangar-db:
    image: ${OPENHANGAR_POSTGRES_IMAGE_TAG:-postgres:18-alpine}
    container_name: openhangar-db
    hostname: ${OPENHANGAR_POSTGRES_HOSTNAME:-openhangar-db}
    environment:
      POSTGRES_DB: ${OPENHANGAR_POSTGRES_DB}
      POSTGRES_USER: ${OPENHANGAR_POSTGRES_USER}
      POSTGRES_PASSWORD: ${OPENHANGAR_POSTGRES_PASSWORD}
    volumes:
      - ./openhangar/data/postgres:/var/lib/postgresql
    networks:
      - traefik-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OPENHANGAR_POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  openhangar-web:
    image: ${OPENHANGAR_IMAGE:-ghcr.io/e2jk/openhangar:latest}
    container_name: openhangar-web
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openhangar.rule=Host(`${OPENHANGAR_HOSTNAME}`)"
      - "traefik.http.routers.openhangar.service=openhangar"
      - "traefik.http.routers.openhangar.entrypoints=websecure"
      - "traefik.http.routers.openhangar.tls=true"
      - "traefik.http.routers.openhangar.tls.certresolver=letsencrypt"
      - "traefik.http.services.openhangar.loadbalancer.server.port=5000"
      - "traefik.http.services.openhangar.loadbalancer.passhostheader=true"
      - "traefik.http.routers.openhangar.middlewares=openhangar-compress,openhangar-headers"
      - "traefik.http.middlewares.openhangar-compress.compress=true"
      - "traefik.http.middlewares.openhangar-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.openhangar-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.openhangar-headers.headers.stsPreload=true"
      # Separate router with a strict rate-limit for the login endpoint.
      # Traefik picks this router over the main one because its rule is more specific.
      - "traefik.http.routers.openhangar-auth.rule=Host(`${OPENHANGAR_HOSTNAME}`) && Path(`/login`)"
      - "traefik.http.routers.openhangar-auth.entrypoints=websecure"
      - "traefik.http.routers.openhangar-auth.tls=true"
      - "traefik.http.routers.openhangar-auth.tls.certresolver=letsencrypt"
      - "traefik.http.routers.openhangar-auth.service=openhangar"
      - "traefik.http.routers.openhangar-auth.middlewares=openhangar-auth-ratelimit,openhangar-compress,openhangar-headers"
      - "traefik.http.middlewares.openhangar-auth-ratelimit.ratelimit.average=5"
      - "traefik.http.middlewares.openhangar-auth-ratelimit.ratelimit.burst=10"
      - "traefik.http.middlewares.openhangar-auth-ratelimit.ratelimit.period=1m"
      - "traefik.docker.network=traefik-network"
    environment:
      - OPENHANGAR_DATABASE_URL=postgresql://${OPENHANGAR_POSTGRES_USER}:${OPENHANGAR_POSTGRES_PASSWORD}@${OPENHANGAR_POSTGRES_HOSTNAME:-openhangar-db}:5432/${OPENHANGAR_POSTGRES_DB}
      - OPENHANGAR_DB_HOST=${OPENHANGAR_POSTGRES_HOSTNAME:-openhangar-db}
      - OPENHANGAR_ENV=production
      - OPENHANGAR_SECRET_KEY=${OPENHANGAR_SECRET_KEY}
      - OPENHANGAR_BACKUP_ENCRYPTION_KEY=${OPENHANGAR_BACKUP_ENCRYPTION_KEY}
      # Optional: enable PWA service-worker caching even in debug/dev mode (default off in debug):
      # - OPENHANGAR_SW_ENABLED=true
      # Optional: session lifetime in days (default 30; increase for PWA/mobile users):
      # - OPENHANGAR_SESSION_LIFETIME_DAYS=${OPENHANGAR_SESSION_LIFETIME_DAYS}
      # Optional: OpenAIP API key for aviation map tiles (uncomment and set in .env):
      # - OPENHANGAR_OPENAIP_API_KEY=${OPENHANGAR_OPENAIP_API_KEY}
      # Optional SMTP settings for email notifications (uncomment and set in .env).
      # These can be added after your first login (see docs/configuration.md).
      # - OPENHANGAR_SMTP_HOST=${OPENHANGAR_SMTP_HOST}
      # - OPENHANGAR_SMTP_PORT=${OPENHANGAR_SMTP_PORT:-587}
      # - OPENHANGAR_SMTP_USER=${OPENHANGAR_SMTP_USER}
      # - OPENHANGAR_SMTP_PASSWORD=${OPENHANGAR_SMTP_PASSWORD}
      # - OPENHANGAR_SMTP_USE_TLS=${OPENHANGAR_SMTP_USE_TLS:-true}
      # - OPENHANGAR_SMTP_FROM_ADDRESS=${OPENHANGAR_SMTP_FROM_ADDRESS}
      # - OPENHANGAR_SMTP_FROM_NAME=${OPENHANGAR_SMTP_FROM_NAME:-OpenHangar}
      # Optional: public URL of this instance, shown in email footers:
      # - OPENHANGAR_INSTANCE_URL=https://${OPENHANGAR_HOSTNAME}
      # Optional security alerting channels (uncomment and set in .env):
      # - OPENHANGAR_ALERT_NTFY_TOPIC_URL=${OPENHANGAR_ALERT_NTFY_TOPIC_URL}
      # - OPENHANGAR_ALERT_EMAIL_TO=${OPENHANGAR_ALERT_EMAIL_TO}
      # - OPENHANGAR_ALERT_WEBHOOK_URL=${OPENHANGAR_ALERT_WEBHOOK_URL}
      # Optional Gatus monitoring badges on the config page (uncomment and set in .env):
      # - OPENHANGAR_GATUS_ENDPOINT_URL=${OPENHANGAR_GATUS_ENDPOINT_URL}
      # - OPENHANGAR_GATUS_AUTH_HEADER=${OPENHANGAR_GATUS_AUTH_HEADER}
      # Optional: forward gunicorn HTTP access logs to docker logs (stdout):
      # - OPENHANGAR_ACCESS_LOG=1
      # Optional: one-click upgrade from the config page (uncomment with the volume mount below;
      # see docs/self-hosting.md#one-click-upgrades for cron setup):
      # - OPENHANGAR_UPGRADE_DIR=/data/upgrade
    volumes:
      - ./openhangar/data/uploads:/data/uploads
      - ./openhangar/data/backups:/data/backups
      # Optional: mount the access log directory to read logs from the host:
      # - ./openhangar/data/logs:/data/logs
      # Optional: one-click upgrade support (uncomment with OPENHANGAR_UPGRADE_DIR above):
      # - ./openhangar/data/upgrade:/data/upgrade
    depends_on:
      openhangar-db:
        condition: service_healthy
    restart: unless-stopped
