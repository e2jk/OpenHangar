networks:
  traefik-network:

services:
  traefik:
    image: ${TRAEFIK_IMAGE_TAG:-traefik:v3}
    container_name: traefik
    command:
      - "--log.level=${TRAEFIK_LOG_LEVEL:-WARN}"
      - "--accesslog=true"
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--ping=true"
      - "--ping.entrypoint=ping"
      - "--entryPoints.ping.address=:8082"
      - "--entryPoints.web.address=:80"
      - "--entryPoints.web.http.redirections.entryPoint.to=websecure"
      - "--entryPoints.web.http.redirections.entryPoint.scheme=https"
      - "--entryPoints.websecure.address=:443"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedByDefault=false"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme/acme.json"
      - "--global.checkNewVersion=false"
      - "--global.sendAnonymousUsage=false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik/acme:/etc/traefik/acme
    networks:
      - traefik-network
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "wget", "http://localhost:8082/ping", "--spider"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`${TRAEFIK_HOSTNAME}`)"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.traefik-dashboard.loadbalancer.passhostheader=true"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-dashboard-auth"
      - "traefik.http.middlewares.traefik-dashboard-auth.basicauth.users=${TRAEFIK_BASIC_AUTH}"
    restart: unless-stopped

  openhangar-db:
    image: ${OPENHANGAR_POSTGRES_IMAGE_TAG:-postgres:18-alpine}
    container_name: openhangar-db
    hostname: ${OPENHANGAR_POSTGRES_HOSTNAME:-openhangar-db}
    environment:
      POSTGRES_DB: ${OPENHANGAR_POSTGRES_DB}
      POSTGRES_USER: ${OPENHANGAR_POSTGRES_USER}
      POSTGRES_PASSWORD: ${OPENHANGAR_POSTGRES_PASSWORD}
    volumes:
      - ./openhangar/data/postgres_data:/var/lib/postgresql/data
    networks:
      - traefik-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OPENHANGAR_POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  openhangar-web:
    image: ${OPENHANGAR_IMAGE:-ghcr.io/e2jk/openhangar:latest}
    container_name: openhangar-web
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openhangar.rule=Host(`${OPENHANGAR_HOSTNAME}`)"
      - "traefik.http.routers.openhangar.service=openhangar"
      - "traefik.http.routers.openhangar.entrypoints=websecure"
      - "traefik.http.routers.openhangar.tls=true"
      - "traefik.http.routers.openhangar.tls.certresolver=letsencrypt"
      - "traefik.http.services.openhangar.loadbalancer.server.port=5000"
      - "traefik.http.services.openhangar.loadbalancer.passhostheader=true"
      - "traefik.http.routers.openhangar.middlewares=openhangar-compress"
      - "traefik.http.middlewares.openhangar-compress.compress=true"
      - "traefik.docker.network=traefik-network"
    environment:
      - DATABASE_URL=postgresql://${OPENHANGAR_POSTGRES_USER}:${OPENHANGAR_POSTGRES_PASSWORD}@${OPENHANGAR_POSTGRES_HOSTNAME:-openhangar-db}:5432/${OPENHANGAR_POSTGRES_DB}
      - DB_HOST=${OPENHANGAR_POSTGRES_HOSTNAME:-openhangar-db}
      - FLASK_ENV=production
      - SECRET_KEY=${OPENHANGAR_SECRET_KEY}
      - BACKUP_ENCRYPTION_KEY=${OPENHANGAR_BACKUP_ENCRYPTION_KEY}
      # Optional SMTP settings for email notifications (uncomment and set in .env):
      # - SMTP_HOST=${SMTP_HOST}
      # - SMTP_PORT=${SMTP_PORT:-587}
      # - SMTP_USER=${SMTP_USER}
      # - SMTP_PASSWORD=${SMTP_PASSWORD}
      # - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      # - SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS}
      # - SMTP_FROM_NAME=${SMTP_FROM_NAME:-OpenHangar}
    volumes:
      - ./openhangar/data/uploads:/data/uploads
      - ./openhangar/data/backups:/data/backups
    depends_on:
      openhangar-db:
        condition: service_healthy
    restart: unless-stopped
